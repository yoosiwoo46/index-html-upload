function buyHeatmapAccess() {
  if (G.player.money < 500) { showModal('余额不足', '<p>需要500元</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]); return; }
  G.player.money -= 500; G.totalExpense += 500;
  addExpenseRecord('购物', 500);
  // 找到第一个已加入的平台来绑定
  let pk = null;
  for (let k of ['DD','GD','E']) { if (G.platforms[k].joined && G.platforms[k].kickedOutMonth < 0) { pk = k; break; } }
  if (pk) G[pk + '_heatmapPaidUntil'] = getGameMonthIndex() + 1;
  addLog('📍 购买热力图30天权限 -500元', 'info');
  closeModal(); showOnlineOrder(); saveGame();
}

function becomeQuSongCheDriver() {
  let canBeQSC = false;
  let qscPlatformCount = 0;
  for (let pk of ['DD','GD','E']) {
    if (G.platforms[pk].joined && G.platforms[pk].kickedOutMonth < 0) {
      qscPlatformCount += G.platforms[pk].monthlyOrders || 0;
    }
  }
  if (qscPlatformCount < 50 || G.player.drive <= 50) return;
  if (G.player.money < 500) { showModal('余额不足', '<p>需要500元</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]); return; }
  G.player.money -= 500; G.totalExpense += 500;
  addExpenseRecord('购物', 500);
  G.player.isQuSongCheDriver = true;
  addLog('🚗 成为取送车司机！装备费500元', 'good');
  updateStatusBar(); showOnlineOrder(); saveGame();
  showModal('认证成功', '<p>您已成为取送车司机！</p><p>抢单大厅和派单中将出现取送车订单</p>', [{text:'确定',cls:'btn-primary',action:function(){ closeModal(); showOnlineOrder(); }}]);
}

function showPlatformShop(pk) {
  let p = G.platforms[pk];
  if (!p || !p.joined || p.kickedOutMonth >= 0) { showModal('提示', '<p>无法访问该平台商城</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]); return; }
  
  let d = getGameDate();
  let isWinter = d.month >= 11 || d.month <= 2;
  let monthIdx = getGameMonthIndex();
  let monthsSinceJoin = monthIdx - (p.joinMonth || 0);
  
  // 装备折旧检查
  let needNewEquip = monthsSinceJoin >= 6;
  let equipPrice = 400;
  let priceFloat = 1 + (Math.random() * 0.2 - 0.1); // ±10%
  equipPrice = Math.floor(equipPrice * priceFloat);
  if (isWinter) equipPrice = Math.floor(equipPrice * 0.5);
  
  // 当月消费统计
  let monthSpend = 0;
  (G.shopPurchases || []).forEach(function(r) { if (r.monthIndex === monthIdx && r.platform === pk) monthSpend += r.amount; });
  
  let html = '<h4>' + pk + '商城</h4>';
  
  // 装备状态
  html += '<div style="background:#1e1e1e;padding:8px;border-radius:4px;margin-bottom:10px;">';
  if (needNewEquip) {
    html += '<p style="color:var(--warning);">⚠️ 装备已折旧（6个月），需购买新装备</p>';
    html += '<button class="btn-warning btn-small" onclick="buyShopItem(\'' + pk + '\',\'equip\',' + equipPrice + ')">购买新装备（' + equipPrice + '元）</button>';
  } else {
    html += '<p style="color:var(--success);">✅ 装备正常（剩余' + (6 - monthsSinceJoin) + '个月）</p>';
  }
  html += '</div>';
  
  // 当月消费提示
  if (monthSpend > 0) {
    html += '<p style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">本月已消费：' + monthSpend + '元' + (monthSpend >= 15000 ? '（已解锁下月热力图！）' : '（再消费' + (15000 - monthSpend) + '元解锁下月热力图）') + '</p>';
  }
  
  // 商品列表
  let items = [
    {id:'book_talk', name:'《别让自己输在不会表达上》', basePrice:1000, desc:'话术+2~5'},
    {id:'book_luxury', name:'《我那开劳斯莱斯的父亲》', basePrice:3000, desc:'豪车+2~5'},
    {id:'book_drive', name:'《科目四题库精讲》', basePrice:1000, desc:'驾驶+2~5'},
    {id:'simulator', name:'家用行驶模拟器', basePrice:10000, desc:'驾驶+5~15'},
  ];
  
  html += '<div style="display:flex;flex-direction:column;gap:8px;">';
  items.forEach(function(item) {
    let price = Math.floor(item.basePrice * 0.8);
    price = Math.floor(price * (1 + (Math.random() * 0.2 - 0.1)));
    if (isWinter) price = Math.floor(price * 0.5);
    let origPrice = item.basePrice;
    html += '<div style="background:#1e1e1e;padding:8px;border-radius:4px;display:flex;justify-content:space-between;align-items:center;">';
    html += '<div><p style="font-size:13px;">' + item.name + '</p><p style="font-size:11px;color:var(--text-secondary);">' + item.desc + '</p><p style="font-size:11px;color:var(--text-secondary);">商店原价：' + origPrice + '元 | 商城价：<span style="color:var(--gold);">' + price + '元</span></p></div>';
    html += '<button class="btn-warning btn-small" onclick="buyShopItem(\'' + pk + '\',\'' + item.id + '\',' + price + ')">' + price + '元</button>';
    html += '</div>';
  });
  
  // 司机权益
  let rights = [
    {id:'bao_shang_bao', name:'保上保', basePrice:8000, desc:'15天内车损免赔免扣代驾分'},
    {id:'youzhi_order', name:'优质订单优先享', basePrice:3000, desc:'前10笔派单50km+，抢单+10pp，7天'},
    {id:'mian_yong', name:'超值免佣包', basePrice:5000, desc:'8天订单收入×1.2'},
  ];
  
  html += '<h4 style="margin-top:12px;">🛡️ 司机权益</h4>';
  // 保上保动态价格
  let baoPrice = 8000;
  if (G[pk + '_baoShangBaoPrice']) baoPrice = G[pk + '_baoShangBaoPrice'];
  // 检查上次购买15天内事故次数
  if (G[pk + '_baoShangBaoAccidents'] && G[pk + '_baoShangBaoAccidents'] > 4) {
    baoPrice += 1000;
  }
  // 更新basePrice
  rights = rights.map(function(r) {
    if (r.id === 'bao_shang_bao') return Object.assign({}, r, {basePrice: baoPrice});
    return r;
  });
  rights.forEach(function(r) {
    let price = r.basePrice;
    if (isWinter) price = Math.floor(price * 0.7); // 权益冬季7折
    html += '<div style="background:#1e1e1e;padding:8px;border-radius:4px;display:flex;justify-content:space-between;align-items:center;">';
    html += '<div><p style="font-size:13px;">' + r.name + '</p><p style="font-size:11px;color:var(--text-secondary);">' + r.desc + '</p></div>';
    html += '<button class="btn-warning btn-small" onclick="buyShopItem(\'' + pk + '\',\'' + r.id + '\',' + price + ')">' + price + '元</button>';
    html += '</div>';
  });
  html += '</div>';
  
  showModal(pk + '商城', html, [{text:'关闭', cls:'btn-secondary', action:closeModal}]);
}

function buyShopItem(pk, itemId, price) {
  // 权益到期前不可重复购买
  let rightIds = ['bao_shang_bao', 'youzhi_order', 'mian_yong'];
  if (rightIds.indexOf(itemId) >= 0) {
    let oldKeys = {bao_shang_bao: pk+'_baoShangBao', youzhi_order: pk+'_youzhiOrder', mian_yong: pk+'_mianYong'};
    let newKey = pk + '_' + itemId;
    let oldKey = oldKeys[itemId];
    if ((G[newKey] && getGameDayIndex() <= G[newKey]) || (G[oldKey] && typeof G[oldKey] === 'number' && getGameDayIndex() <= G[oldKey]) || (G[oldKey] && G[oldKey].expireDay && getGameDayIndex() <= G[oldKey].expireDay)) {
      showModal('提示', '<p>该权益尚未到期，无法重复购买</p>', [{text:'确定',cls:'btn-primary',action:function(){ closeModal(); showPlatformShop(pk); }}]);
      return;
    }
  }
  if (G.player.money < price) { showModal('余额不足', '<p>需要' + price + '元</p>', [{text:'确定',cls:'btn-primary',action:function(){ closeModal(); showPlatformShop(pk); }}]); return; }
  G.player.money -= price; G.totalExpense += price;
  addExpenseRecord('购物', price);
  if (!G.shopPurchases) G.shopPurchases = [];
  G.shopPurchases.push({platform: pk, item: itemId, amount: price, monthIndex: getGameMonthIndex()});
  
  // 检查是否解锁下月热力图
  let monthSpend = 0;
  let monthIdx = getGameMonthIndex();
  G.shopPurchases.forEach(function(r) { if (r.monthIndex === monthIdx && r.platform === pk) monthSpend += r.amount; });
  if (monthSpend >= 15000 && !G[pk + '_heatmapFreeMonth']) {
    G[pk + '_heatmapFreeMonth'] = monthIdx + 1;
    addLog('🎉 ' + pk + '商城消费满15000元，赠送下月热力图！', 'good');
  }
  
  // 处理特殊物品
  if (itemId === 'equip') {
    G.platforms[pk].joinMonth = getGameMonthIndex(); // 重置折旧
    addLog('🔧 购买' + pk + '新装备 -' + price + '元', 'info');
    showModal('购买成功', '<p>已购买' + pk + '新装备！</p>', [{text:'确定',cls:'btn-primary',action:function(){ closeModal(); showPlatformShop(pk); }}]);
  } else if (itemId === 'bao_shang_bao') {
    G[pk + '_baoShangBao'] = getGameDayIndex() + 15;
    G[pk + '_baoShangBaoBuyDay'] = getGameDayIndex();
    G[pk + '_baoShangBaoPrice'] = price;
    G[pk + '_baoShangBaoAccidents'] = 0;
    addLog('🛡️ 购买' + pk + '保上保（15天）-' + price + '元', 'info');
    showModal('购买成功', '<p>保上保已生效！15天内车损免赔免扣代驾分（服务分正常扣5分）</p>', [{text:'确定',cls:'btn-primary',action:function(){ closeModal(); showPlatformShop(pk); }}]);
  } else if (itemId === 'youzhi_order') {
    G[pk + '_youzhiOrder'] = {count: 10, expireDay: getGameDayIndex() + 7};
    addLog('⭐ 购买' + pk + '优质订单优先享（7天）-' + price + '元', 'info');
    showModal('购买成功', '<p>优质订单优先享已生效！前10笔订单均为50km+</p>', [{text:'确定',cls:'btn-primary',action:function(){ closeModal(); showPlatformShop(pk); }}]);
  } else if (itemId === 'mian_yong') {
    G[pk + '_mianYong'] = getGameDayIndex() + 8;
    addLog('💰 购买' + pk + '超值免佣包（8天）-' + price + '元', 'info');
    showModal('购买成功', '<p>超值免佣包已生效！8天内订单收入×1.2</p>', [{text:'确定',cls:'btn-primary',action:function(){ closeModal(); showPlatformShop(pk); }}]);
  } else if (itemId === 'book_talk') {
    let gain = randInt(2, 5); G.player.talk += gain;
    addLog('📖 阅读《别让自己输在不会表达上》，话术+' + gain, 'good');
    showModal('购买成功', '<p>话术+' + gain + '</p>', [{text:'确定',cls:'btn-primary',action:function(){ closeModal(); showPlatformShop(pk); }}]);
  } else if (itemId === 'book_luxury') {
    let gain = randInt(2, 5); G.player.luxury += gain;
    addLog('📖 阅读《我那开劳斯莱斯的父亲》，豪车+' + gain, 'good');
    showModal('购买成功', '<p>豪车+' + gain + '</p>', [{text:'确定',cls:'btn-primary',action:function(){ closeModal(); showPlatformShop(pk); }}]);
  } else if (itemId === 'book_drive') {
    let gain = randInt(2, 5); G.player.drive += gain;
    addLog('📖 学习《科目四题库精讲》，驾驶+' + gain, 'good');
    showModal('购买成功', '<p>驾驶+' + gain + '</p>', [{text:'确定',cls:'btn-primary',action:function(){ closeModal(); showPlatformShop(pk); }}]);
  } else if (itemId === 'simulator') {
    let gain = randInt(5, 15); G.player.drive += gain;
    addLog('🎮 使用模拟器，驾驶+' + gain, 'good');
    showModal('购买成功', '<p>驾驶+' + gain + '</p>', [{text:'确定',cls:'btn-primary',action:function(){ closeModal(); showPlatformShop(pk); }}]);
  }
  
  saveGame();
}

function showOnlineOrder() {
  if (G.injured) {
    showModal('受伤休息中', '<p>您正在受伤休息中，还有' + (G.injuredUntilDay - getGameDayIndex()) + '天恢复</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]);
    return;
  }
  let html = '';

  // 在线时长（按平台分别显示）
  let html2 = '';
  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    if (!p.joined || p.kickedOutMonth >= 0) continue;
    let mins = p.onlineMinutesToday;
    let hrs = Math.floor(mins / 60);
    let m = mins % 60;
    let isOver = mins >= 14 * 60;
    html2 += '<div style="font-size:12px;color:' + (isOver ? 'var(--danger)' : 'var(--text-secondary)') + ';">' + pk + ': ' + hrs + 'h' + m + 'm' + (isOver ? '（已下线）' : '') + '</div>';
  }

  html += '<div style="margin-bottom:16px;">';
  html += html2;
  html += '</div>';

  // 已生效权益展示
  let activeRights = [];
  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    if (!p.joined || p.kickedOutMonth >= 0) continue;
    let dayIdx = getGameDayIndex();
    if (G[pk + '_baoShangBao'] && dayIdx <= G[pk + '_baoShangBao']) activeRights.push(pk + '-保上保');
    if (G[pk + '_youzhiOrder'] && dayIdx <= G[pk + '_youzhiOrder'].expireDay) activeRights.push(pk + '-优质订单优先享');
    if (G[pk + '_mianYong'] && dayIdx <= G[pk + '_mianYong']) activeRights.push(pk + '-超值免佣包');
  }
  if (activeRights.length > 0) {
    html += '<div style="margin-bottom:12px;padding:8px;background:#1e1e1e;border-radius:4px;border:1px solid #333;">';
    html += '<p style="font-size:12px;color:var(--gold);margin-bottom:4px;">🛡️ 已生效权益</p>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
    activeRights.forEach(function(r) {
      html += '<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:#252525;color:var(--gold);border:1px solid #444;">' + r + '</span>';
    });
    html += '</div></div>';
  }

  // 平台商城入口
  let joinedPlatforms = ['DD','GD','E'].filter(k => G.platforms[k].joined && G.platforms[k].kickedOutMonth < 0);
  if (joinedPlatforms.length > 0) {
    html += '<div style="margin-bottom:16px;">';
    html += '<h4 style="margin-bottom:8px;">🛒 平台商城</h4>';
    joinedPlatforms.forEach(function(pk) {
      html += '<button class="btn-warning btn-small" style="margin-right:8px;" onclick="showPlatformShop(\'' + pk + '\')">' + pk + '商城</button>';
    });
    html += '</div>';
  }

  // 听单控制
  html += '<div style="margin-bottom:16px;">';
  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    if (!p.joined || p.kickedOutMonth >= 0) continue;
    let canListen = p.onlineMinutesToday < 14 * 60;
    // 检查是否需要线下培训
    let mi = getGameMonthIndex();
    if (p.lastTrainingMonth < mi - 1) {
      canListen = false;
    }
    let btnCls = p.listening ? 'btn-danger' : (canListen ? 'btn-success' : 'btn-disabled');
    let btnText = p.listening ? '关闭听单' : '开启听单';
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">' +
      '<span style="width:40px;">' + pk + '</span>' +
      '<button class="' + btnCls + ' btn-small" onclick="toggleListening(\'' + pk + '\')">' + btnText + '</button>' +
      '<span style="font-size:12px;color:var(--text-secondary);">代驾分:' + p.daijiaScore.toFixed(1) + ' 服务分:' + p.serviceScore.toFixed(1) + '</span>' +
      '</div>';
  }
  html += '</div>';

  // 优选升级按钮
  let upgradeHTML = '';
  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    if (!p.joined || p.preferred) continue;
    let canPreferred = false;
    let equipFee = pk === 'E' ? 200 : 300;
    if (pk === 'DD') canPreferred = G.player.exp >= 5 && (G.player.drive >= 25 || G.player.luxury >= 20);
    else if (pk === 'GD') canPreferred = G.player.exp >= 5 && (G.player.drive >= 25 || G.player.luxury >= 20);
    else canPreferred = G.player.drive >= 20 || G.player.luxury >= 18;
    if (canPreferred) {
      upgradeHTML += '<button class="btn-warning btn-small" style="margin:4px 4px 4px 0;" onclick="upgradeToPreferred(\'' + pk + '\')">⬆ ' + pk + '升级优选（' + equipFee + '元）</button>';
    }
  }
  if (upgradeHTML) {
    html += '<div style="margin-bottom:12px;padding:8px;background:var(--bg-card);border-radius:6px;">' +
      '<span style="font-size:12px;color:var(--gold);">可升级优选：</span>' + upgradeHTML + '</div>';
  }

  // 接单热力图（30天免费，之后付费500元/30天）
  let heatmapUnlocked = false;
  let heatmapReason = '';
  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    if (!p.joined) continue;
    let monthsSinceJoin = getGameMonthIndex() - (p.joinMonth || 0);
    if (monthsSinceJoin < 1) { heatmapUnlocked = true; heatmapReason = '新人福利（' + pk + '加入不满30天）'; break; }
    if (G[pk + '_heatmapPaidUntil'] && getGameMonthIndex() <= G[pk + '_heatmapPaidUntil']) { heatmapUnlocked = true; heatmapReason = pk + '商城已解锁'; break; }
    if (G[pk + '_heatmapFreeMonth'] && getGameMonthIndex() <= G[pk + '_heatmapFreeMonth']) { heatmapUnlocked = true; heatmapReason = pk + '商城赠送'; break; }
  }
  
  html += '<h4 style="margin-bottom:10px;color:var(--text-highlight);">📍 接单热力图</h4>';
  if (heatmapUnlocked) {
    html += '<p style="font-size:11px;color:var(--success);margin-bottom:6px;">✅ ' + heatmapReason + '</p>';
    html += buildHeatmapHTML();
  } else {
    html += '<p style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">🔒 新人期已过，需付费解锁</p>';
    html += '<button class="btn-warning btn-small" onclick="buyHeatmapAccess()">购买热力图（500元/30天）</button>';
  }
  html += '<hr style="border-color:var(--border);margin:16px 0;">';

  // 抢单大厅
  html += '<h4 style="margin-bottom:10px;color:var(--text-highlight);">抢单大厅</h4>';

  // 取送车司机按钮
  let canBeQSC = false;
  let qscPlatformCount = 0;
  for (let pk of ['DD','GD','E']) {
    if (G.platforms[pk].joined && G.platforms[pk].kickedOutMonth < 0) {
      qscPlatformCount += G.platforms[pk].monthlyOrders || 0;
    }
  }
  if (qscPlatformCount >= 50 && G.player.drive > 50 && !G.player.isQuSongCheDriver) {
    canBeQSC = true;
  }
  if (!G.player.isQuSongCheDriver) {
    let qscBtnCls = canBeQSC ? 'btn-primary btn-small' : 'btn-disabled btn-small';
    let qscBtnText;
    if (canBeQSC) {
      qscBtnText = '成为取送车司机（500元）';
    } else {
      let orderInfo = qscPlatformCount >= 50 ? '' : '平台单量' + qscPlatformCount + '/50 ';
      let driveInfo = G.player.drive > 50 ? '' : '驾驶' + G.player.drive + '/50';
      qscBtnText = '成为取送车司机（' + orderInfo + driveInfo + '）';
    }
    html += '<button class="' + qscBtnCls + '" onclick="becomeQuSongCheDriver()" style="margin-bottom:10px;">' + qscBtnText + '</button>';
  } else {
    html += '<span style="color:var(--success);font-size:12px;margin-bottom:10px;display:block;">🚗 取送车司机（已认证）</span>';
  }

  G._hallOrders = generateOrders(5);
  if (G._hallOrders.length === 0) {
    html += '<p style="color:var(--text-secondary);">当前没有可抢的订单</p>';
  } else {
    G._hallOrders.forEach((order, i) => {
      html += renderOrderCard(order, i);
    });
  }

  showModal('线上接单', html, [{text:'返回', cls:'btn-secondary', action:closeModal}]);
}

function getCurrentGameMinutes() {
  let d = getGameDate();
  let t = getGameTime();
  return d.year * 525600 + d.month * 43200 + d.day * 1440 + t.h * 60 + t.min;
}

function toggleListening(pk) {
  if (G.injured) {
    showModal('受伤休息中', '<p>您正在受伤休息中，还有' + (G.injuredUntilDay - getGameDayIndex()) + '天恢复</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]);
    return;
  }
  let p = G.platforms[pk];
  
  if (p.listening) {
    // 关闭听单：计算本次听单时长（使用游戏内时间）
    let listenMinutes = getCurrentGameMinutes() - (p._listenStartGameMinutes || getCurrentGameMinutes());
    listenMinutes = Math.max(1, listenMinutes);
    p.onlineMinutesToday = (p.onlineMinutesToday || 0) + listenMinutes;
    p.listening = false;
    p._listenStartGameMinutes = null;
    p._lastListenDay = getGameDayIndex(); // 记录最后听单日期
    addLog('🔇 ' + pk + '关闭听单（本次' + listenMinutes + '分钟）', 'info');
    stopDispatchTimer(pk);
  } else {
    // 开启听单：记录游戏内时间
    p._listenStartGameMinutes = getCurrentGameMinutes();
    p.listening = true;
    p._lastListenDay = getGameDayIndex(); // 记录最后听单日期
    addLog('🎧 ' + pk + '开始听单', 'info');
    startDispatchTimer(pk);
  }
  
  updateStatusBar();
  renderScoreDisplay();
  showOnlineOrder();
  saveGame();
}

function generateOrders(count) {
  let orders = [];
  let landmarks = getLandmarks(G.player.city);
  let t = getGameTime();

  for (let i = 0; i < count; i++) {
    let startIdx = randInt(0, landmarks.length - 1);
    let endIdx = randInt(0, landmarks.length - 1);
    while (endIdx === startIdx) endIdx = randInt(0, landmarks.length - 1);

    let straightDist = randInt(3, 100);
    let distance = Math.min(100, toActualDistance(straightDist));
    let walkMin = randInt(1, 8);
    let bikeMin = Math.max(1, Math.floor(walkMin * 0.4));

    // 只生成骑车5分钟内的订单（牵引用户使用热力图）
    while (bikeMin > 5) {
      walkMin = randInt(1, 8);
      bikeMin = Math.max(1, Math.floor(walkMin * 0.4));
    }

    // 根据入职年限调整收入
    let years = getElapsedYears();
    let targetMin, targetMax;
    if (years < 1) { targetMin = 60; targetMax = 80; }
    else if (years < 2) { targetMin = 70; targetMax = 100; }
    else { targetMin = 80; targetMax = 130; }

    // 计费模式：实时45%，一口价25%，包时7%，万能司机3%，代泊车5%，跨城5%，取送车10%
    // 取送车司机时：一口价25%中10%给取送车，非取送车司机回退为一口价
    let modeRand = Math.random();
    let mode, income, crossCity = false, endCity = null;
    let isQuSongChe = false;

    if (modeRand < 0.45) {
      // 实时计费 45%
      mode = '实时计费';
      let distRand = Math.random();
      if (distRand < 0.75) distance = randInt(1, 20);
      else if (distRand < 0.93) distance = randInt(20, 40);
      else if (distRand < 0.98) distance = randInt(40, 60);
      else distance = randInt(60, 100);
      income = distance <= 5 ? 25 : 25 + (distance - 5) * 8;
    } else if (modeRand < 0.70) {
      // 一口价 25%（取送车司机时为15%，10%给取送车）
      mode = '一口价';
      let distRand = Math.random();
      if (distRand < 0.65) distance = randInt(1, 20);
      else if (distRand < 0.93) distance = randInt(20, 40);
      else if (distRand < 0.98) distance = randInt(40, 60);
      else distance = randInt(60, 100);
      income = distance <= 5 ? 20 : 20 + (distance - 5) * 6;
    } else if (modeRand < 0.77) {
      // 包时 7%
      let baoShiRand = Math.random();
      if (baoShiRand < 0.85) hours = randInt(1, 24) / 2;
      else if (baoShiRand < 0.98) hours = randInt(24, 48) / 2;
      else hours = randInt(48, 96) / 2;
      mode = '包时(' + hours + 'H)';
      income = Math.floor(hours * 70);
      distance = randInt(5, 30);
    } else if (modeRand < 0.80) {
      // 万能司机 3%
      let wnRand = Math.random();
      if (wnRand < 0.85) hours = randInt(1, 24) / 2;
      else if (wnRand < 0.98) hours = randInt(24, 48) / 2;
      else hours = randInt(48, 96) / 2;
      mode = '万能司机(' + hours + 'H)';
      income = Math.floor(hours * 70);
      distance = randInt(5, 30);
    } else if (modeRand < 0.85) {
      // 代泊车 5%
      let hours;
      if (Math.random() < 0.90) hours = 0.5;
      else hours = 1;
      mode = '代泊车(' + hours + 'H)';
      income = Math.floor(hours * 70);
      distance = randInt(1, 5);
    } else if (modeRand < 0.90) {
      // 跨城 5%
      mode = '一口价';
      crossCity = true;
      let cities = Object.keys(CITY_LANDMARKS).filter(c => c !== 'default');
      let otherCities = cities.filter(c => c !== G.player.city);
      if (otherCities.length === 0) otherCities = cities;
      endCity = otherCities[randInt(0, otherCities.length - 1)];
      let endLandmarks = getLandmarks(endCity);
      endIdx = -1;
      let distKey1 = G.player.city + '-' + endCity;
      let distKey2 = endCity + '-' + G.player.city;
      distance = CITY_DISTANCES[distKey1] || CITY_DISTANCES[distKey2] || randInt(200, 1500);
      income = Math.floor(distance * 3 + randInt(50, 150));
    } else {
      // 取送车 10%（仅取送车司机）
      if (G.player.isQuSongCheDriver) {
        isQuSongChe = true;
        mode = '取送车';
        let distRand = Math.random();
        if (distRand < 0.65) distance = randInt(1, 20);
        else if (distRand < 0.93) distance = randInt(20, 40);
        else if (distRand < 0.98) distance = randInt(40, 60);
        else distance = randInt(60, 100);
        income = distance <= 5 ? 25 : 25 + (distance - 5) * 7;
      } else {
        // 非取送车司机，回退为一口价
        mode = '一口价';
        let distRand = Math.random();
        if (distRand < 0.65) distance = randInt(1, 20);
        else if (distRand < 0.93) distance = randInt(20, 40);
        else if (distRand < 0.98) distance = randInt(40, 60);
        else distance = randInt(60, 100);
        income = distance <= 5 ? 20 : 20 + (distance - 5) * 6;
      }
    }

    income = Math.floor(income) + G.priceAdjust;

    // 动调费
    if ((t.h >= 0 && t.h < 4) && (mode === '一口价' || mode === '实时计费')) {
      income = Math.floor(income * 1.1);
    }

    // 节假日
    if (isHoliday()) income += 5;

    // 红包（platform在后面赋值，此处用已加入平台的服务分判断）
    let _anyServiceScore80 = Object.keys(G.platforms).some(k => G.platforms[k].joined && G.platforms[k].kickedOutMonth < 0 && G.platforms[k].serviceScore > 80);
    let hasRedPacket = chance((G.player.talk > 80 || _anyServiceScore80) ? 10 : 5);

    // 优质订单判断
    let isPremium = distance > 50 || income > 400;

    // 随机平台
    let joinedPlatforms = Object.keys(G.platforms).filter(k => G.platforms[k].joined);
    // 过滤掉已清退的平台
    joinedPlatforms = joinedPlatforms.filter(k => G.platforms[k].kickedOutMonth < 0);
    // 过滤掉今日听单已达14小时的平台
    joinedPlatforms = joinedPlatforms.filter(k => G.platforms[k].onlineMinutesToday < 14 * 60);
    if (joinedPlatforms.length === 0) return orders;
    let platform = joinedPlatforms.length > 0 ? joinedPlatforms[randInt(0, joinedPlatforms.length - 1)] : 'DD';

    // 作弊器效果：每单均为100km+
    if (G.hasCheater && !crossCity) {
      distance = randInt(100, 200);
      if (mode === '实时计费') income = distance <= 5 ? 25 : 25 + (distance - 5) * 8;
      else if (mode === '一口价' || mode === '取送车') income = distance <= 5 ? 20 : 20 + (distance - 5) * 6;
      else if (mode.indexOf('包时') === 0 || mode.indexOf('万能司机') === 0 || mode.indexOf('代泊车') === 0) income = Math.floor(distance * 1.5);
    }

    orders.push({
      id: Date.now() + i,
      platform,
      start: landmarks[startIdx],
      end: crossCity ? (endCity + '·随机地点') : landmarks[endIdx],
      distance,
      walkMin,
      bikeMin,
      mode,
      income,
      isPremium,
      crossCity,
      endCity: endCity,
      hasRedPacket,
      isLuxury: chance(15)
    });
  }
  return orders;
}

function acceptOrder(idx) {
  // 检查是否已有订单
  if (G.currentOrder) {
    showModal('提示', '<p>您当前已有进行中的订单，请先完成。</p>',
      [{text:'确定', cls:'btn-primary', action: function(){ closeModal(); showCurrentOrder(); }}]);
    return;
  }

  // 从抢单大厅缓存获取订单
  let orders = G._hallOrders || [];
  if (idx >= orders.length) return;
  let order = orders[idx];

  // 检查服务分决定抢单成功率
  let p = G.platforms[order.platform];
  if (!p || !p.joined) {
    showModal('提示', '<p>您未加入' + order.platform + '平台</p>',
      [{text:'确定', cls:'btn-primary', action:closeModal}]);
    return;
  }

  let successRate = 30;
  if (p.serviceScore > 80) successRate = 90;
  else if (p.serviceScore > 60) successRate = 50;

  // 优质订单优先享：抢单成功率+10pp
  let yp = G[order.platform + '_youzhiOrder'];
  if (yp && getGameDayIndex() <= yp.expireDay) {
    successRate = Math.min(100, successRate + 10);
  }

  if (!chance(successRate)) {
    addLog('❌ 抢单失败（成功率' + successRate + '%）', 'bad');
    showModal('抢单失败', '<p>抢单失败，该订单已被其他司机抢走。</p><p style="color:var(--text-secondary);">成功率：' + successRate + '%</p>',
      [{text:'确定', cls:'btn-primary', action: function(){ closeModal(); showOnlineOrder(); }}]);
    return;
  }

  // 接单成功
  G.currentOrder = order;
  p.hasOrder = true;
  addLog('✅ 成功接到' + order.platform + '订单！' + order.start + '→' + order.end, 'good');

  closeModal();
  updateStatusBar(); renderMainMenu(); saveGame();
}

function rejectOrder(idx) {
  // 记录拒绝
  let orders = G._hallOrders || [];
  if (idx >= orders.length) return;
  let order = orders[idx];
  let p = G.platforms[order.platform];
  if (p && p.joined) {
    p.rejectCount7++;
    p.rejectCount30++;
    if (p.rejectCount7 >= 10) {
      p.serviceScore = Math.max(0, p.serviceScore - 10);
      p.rejectCount7 = 0;
      addLog('📉 7天拒绝10次，' + order.platform + '服务分-10', 'bad');
    }
    if (p.rejectCount30 >= 50) {
      p.daijiaScore = Math.max(0, p.daijiaScore - 2);
      p.rejectCount30 = 0;
      addLog('📉 30天拒绝50次，' + order.platform + '代驾分-2', 'bad');
    }
  }
  addLog('⏭️ 拒绝了一个订单', 'info');
  showOnlineOrder();
  updateStatusBar();
  renderScoreDisplay();
}

function showCurrentOrder() {
  if (!G.currentOrder) {

// 派单使用真实秒数定时器
let dispatchRealTimers = {}; // 各平台真实秒数定时器

function getDispatchIntervalSec(pk) {
  let t = getGameTime();
  let isNight = t.h >= 22 || t.h < 4;
  if (isNight) {
    // 夜间(22-4点): DD 2-5秒, GD 3-10秒, E 5-15秒
    if (pk === 'DD') return randInt(2, 5);
    if (pk === 'GD') return randInt(3, 10);
    return randInt(5, 15);
  } else {
    // 其他时间: DD 4-8秒, GD 6-12秒, E 10-15秒
    if (pk === 'DD') return randInt(4, 8);
    if (pk === 'GD') return randInt(6, 12);
    return randInt(10, 15);
  }
}

function startDispatchTimer(pk) {
  stopDispatchTimer(pk);
  let interval = getDispatchIntervalSec(pk);
  dispatchRealTimers[pk] = setTimeout(function() {
    dispatchRealTimers[pk] = null;
    let p = G.platforms[pk];
    if (!p || !p.joined || !p.listening || G.gameOver || G.currentOrder) return;

    // 该平台在线时长检查
    if (p.onlineMinutesToday >= 14 * 60) return;

    // 线下培训检查
    let mi = getGameMonthIndex();
    if (p.lastTrainingMonth < mi - 1) return;

    // 生成并弹出派单
    dispatchSingleOrder(pk);

    // 继续下一次派单
    if (p.listening && !G.currentOrder) {
      startDispatchTimer(pk);
    }
  }, interval * 1000);
}

function stopDispatchTimer(pk) {
  if (dispatchRealTimers[pk]) {
    clearTimeout(dispatchRealTimers[pk]);
    dispatchRealTimers[pk] = null;
  }
}

function stopAllDispatchTimers() {
  for (let pk of ['DD','GD','E']) stopDispatchTimer(pk);
}

function dispatchSingleOrder(pk) {
  let p = G.platforms[pk];
  if (!p || !p.joined || !p.listening) return;
  // 过滤掉已清退的平台
  if (p.kickedOutMonth >= 0) return;

  let t = getGameTime();

  // 优质订单概率
  let premiumRate = pk === 'DD' ? 25 : pk === 'GD' ? 20 : 10;
  if (p.preferred) premiumRate += 10;
  if (p.serviceScore > 80) premiumRate += 20;

  // 星享司机效果：增加跨城和远距离概率
  if (p.starDriver) {
    premiumRate += 15;
  }
  // 她代驾效果：增加优质订单概率
  if (p.sheDriver) {
    premiumRate += 10;
  }

  let isPremium = false; // 优质订单在生成后按距离/收入判断

  // 生成订单
  let landmarks = getLandmarks(G.player.city);
  let startIdx = randInt(0, landmarks.length - 1);
  let endIdx = randInt(0, landmarks.length - 1);
  while (endIdx === startIdx) endIdx = randInt(0, landmarks.length - 1);

  let straightDist = isPremium ? randInt(50, 100) : randInt(3, 100);
  let distance = Math.min(100, toActualDistance(straightDist));
  let walkMin = isPremium ? randInt(1, 2) : randInt(1, 8);
  let bikeMin = Math.max(1, Math.floor(walkMin * 0.4));
  while (bikeMin > 5) {
    walkMin = randInt(1, 8);
    bikeMin = Math.max(1, Math.floor(walkMin * 0.4));
  }

  // 根据入职年限调整收入
  let years = getElapsedYears();
  let targetMin, targetMax;
  if (years < 1) { targetMin = 60; targetMax = 80; }
  else if (years < 2) { targetMin = 70; targetMax = 100; }
  else { targetMin = 80; targetMax = 130; }

  // 计费模式：一口价47%，实时25%，包时5%，万能司机5%，代泊车5%，跨城3%，取送车10%
  let modeRand = Math.random();
  let mode, income, crossCity = false;
  let isQuSongChe = false;

  if (modeRand < 0.47) {
    // 一口价 47%
    mode = '一口价';
    income = randInt(targetMin, targetMax);
    distance = Math.max(3, Math.round((income - 20) / 6 + 5));
  } else if (modeRand < 0.72) {
    // 实时计费 25%
    mode = '实时计费';
    income = randInt(targetMin, targetMax);
    distance = Math.max(3, Math.round(income / 8));
  } else if (modeRand < 0.77) {
    // 包时 5%
    let baoShiRand = Math.random();
    if (baoShiRand < 0.85) hours = randInt(1, 24) / 2;
    else if (baoShiRand < 0.98) hours = randInt(24, 48) / 2;
    else hours = randInt(48, 96) / 2;
    mode = '包时(' + hours + 'H)';
    income = Math.floor(hours * 70);
    distance = randInt(5, 30);
  } else if (modeRand < 0.82) {
    // 万能司机 5%
    let wnRand = Math.random();
    if (wnRand < 0.85) hours = randInt(1, 24) / 2;
    else if (wnRand < 0.98) hours = randInt(24, 48) / 2;
    else hours = randInt(48, 96) / 2;
    mode = '万能司机(' + hours + 'H)';
    income = Math.floor(hours * 70);
    distance = randInt(5, 30);
  } else if (modeRand < 0.87) {
    // 代泊车 5%
    let hours;
    if (Math.random() < 0.90) hours = 0.5;
    else hours = 1;
    mode = '代泊车(' + hours + 'H)';
    income = Math.floor(hours * 70);
    distance = randInt(1, 5);
  } else if (modeRand < 0.90) {
    // 跨城 3%
    crossCity = true;
    mode = '一口价';
  } else {
    // 取送车 10%（仅取送车司机）
    if (G.player.isQuSongCheDriver) {
      isQuSongChe = true;
      mode = '取送车';
      let distRand = Math.random();
      if (distRand < 0.65) distance = randInt(1, 20);
      else if (distRand < 0.93) distance = randInt(20, 40);
      else if (distRand < 0.98) distance = randInt(40, 60);
      else distance = randInt(60, 100);
      income = distance <= 5 ? 25 : 25 + (distance - 5) * 7;
    } else {
      // 非取送车司机，回退为一口价
      mode = '一口价';
      income = randInt(targetMin, targetMax);
      distance = Math.max(3, Math.round((income - 20) / 6 + 5));
    }
  }
  income = Math.floor(income) + G.priceAdjust;

  if ((t.h >= 0 && t.h < 4) && (mode === '一口价' || mode === '实时计费')) {
    income = Math.floor(income * 1.1);
  }
  if (isHoliday()) income += 5;

  // 跨城已在计费模式中处理
  if (crossCity) {
    // 跨城距离计算
    let cities = Object.keys(CITY_LANDMARKS).filter(c => c !== 'default');
    let otherCities = cities.filter(c => c !== G.player.city);
    if (otherCities.length === 0) otherCities = cities;
    endCity = otherCities[randInt(0, otherCities.length - 1)];
    let distKey1 = G.player.city + '-' + endCity;
    let distKey2 = endCity + '-' + G.player.city;
    distance = CITY_DISTANCES[distKey1] || CITY_DISTANCES[distKey2] || randInt(200, 1500);
    income = Math.floor(distance * 3 + randInt(50, 150));
    endIdx = -1; // 跨城不使用同城地标索引
  }

  // 恶劣天气补贴
  let weatherBonus = 0;
  if (G.weather === '下雨' || G.weather === '下雪') {
    income += 30;
    weatherBonus = 30;
  }

  // 作弊器效果
  if (G.hasCheater && !crossCity) {
    distance = randInt(100, 200);
    if (mode === '实时计费') income = distance <= 5 ? 25 : 25 + (distance - 5) * 8;
    else if (mode === '一口价' || mode === '取送车') income = distance <= 5 ? 20 : 20 + (distance - 5) * 6;
    else if (mode.indexOf('包时') === 0 || mode.indexOf('万能司机') === 0 || mode.indexOf('代泊车') === 0) income = Math.floor(distance * 1.5);
  }

  // 优质订单判断：距离>50km或收入>400元
  if (distance > 50 || income > 400) isPremium = true;

  let order = {
    id: Date.now(),
    platform: pk,
    start: landmarks[startIdx],
    end: crossCity ? (endCity + '·随机地点') : landmarks[endIdx],
    distance, walkMin, bikeMin, mode, income,
    isPremium, crossCity,
    endCity: crossCity ? endCity : undefined,
    hasRedPacket: chance((p.serviceScore > 80 || G.player.talk > 80) ? 10 : 5),
    isLuxury: chance(15),
    weatherBonus: weatherBonus
  };

  // 优质订单优先享
  let yp = G[pk + '_youzhiOrder'];
  if (yp && yp.count > 0 && getGameDayIndex() <= yp.expireDay) {
    order.distance = Math.min(100, randInt(50, 100));
    order.income = order.distance <= 5 ? 20 : 20 + (order.distance - 5) * 6;
    yp.count--;
  }

  // 存入待处理队列而不是直接弹窗
  G.pendingDispatches.push(order);

  // 延迟检查是否有更多派单同时到达
  if (!G._dispatchCheckScheduled) {
    G._dispatchCheckScheduled = true;
    setTimeout(function() {
      G._dispatchCheckScheduled = false;
      checkAndShowPendingDispatches();
    }, 500);
  }
}

function checkAndShowPendingDispatches() {
  if (G.pendingDispatches.length === 0 || G.currentOrder) return;

  let orders = G.pendingDispatches.slice();
  G.pendingDispatches = [];

  if (orders.length === 1) {
    // 单个订单，直接弹窗
    showDispatchNotification(orders[0]);
  } else {
    // 多个订单，展示综合选择界面
    showMultiDispatchNotification(orders);
  }
}

function showMultiDispatchNotification(orders) {
  let html = '<p style="color:var(--warning);margin-bottom:12px;">多个平台同时派单！请选择接哪个：</p>';
  orders.forEach((o, i) => {
    html += '<div class="order-card" style="margin-bottom:10px;">' +
      '<div class="order-info">' +
      '<div><span class="label">平台：</span><span class="value">' + o.platform + '</span></div>' +
      '<div><span class="label">起点：</span><span class="value">' + o.start + '</span></div>' +
      '<div><span class="label">终点：</span><span class="value">' + o.end + '</span></div>' +
      '<div><span class="label">里程：</span><span class="value">' + o.distance + 'km</span></div>' +
      '<div><span class="label">预估收入：</span><span class="income">' + o.income + '元</span></div>' +
      '</div>' +
      '<button class="btn-success btn-small" onclick="acceptMultiDispatch(' + i + ')">接此单</button>' +
      '</div>';
  });

  window._multiDispatchOrders = orders;
  showModal('多平台派单（' + orders.length + '个）', html, [
    {text:'全部取消', cls:'btn-danger', action: function(){
      let ords = window._multiDispatchOrders;
      ords.forEach(o => {
        let p = G.platforms[o.platform];
        p.rejectCount7++;
        p.rejectCount30++;
        if (p.rejectCount7 >= 10) { p.serviceScore = Math.max(0, p.serviceScore - 10); p.rejectCount7 = 0; }
        if (p.rejectCount30 >= 50) { p.daijiaScore = Math.max(0, p.daijiaScore - 2); p.rejectCount30 = 0; }
        addLog('⏭️ 取消了' + o.platform + '派单', 'info');
      });
      closeModal();
      updateStatusBar(); renderScoreDisplay();
    }}
  ], null, true);
}

function acceptMultiDispatch(idx) {
  let orders = window._multiDispatchOrders;
  let accepted = orders[idx];

  // 取消其他订单
  orders.forEach((o, i) => {
    if (i !== idx) {
      let p = G.platforms[o.platform];
      p.rejectCount7++;
      p.rejectCount30++;
      if (p.rejectCount7 >= 10) { p.serviceScore = Math.max(0, p.serviceScore - 10); p.rejectCount7 = 0; }
      if (p.rejectCount30 >= 50) { p.daijiaScore = Math.max(0, p.daijiaScore - 2); p.rejectCount30 = 0; }
      addLog('⏭️ 取消了' + o.platform + '派单', 'info');
    }
  });

  G.currentOrder = accepted;
  G.platforms[accepted.platform].hasOrder = true;
  addLog('✅ 接到' + accepted.platform + '派单！' + accepted.start + '→' + accepted.end, 'good');
  closeModal();
  updateStatusBar(); renderMainMenu(); saveGame();
}

}

function showDispatchNotification(order) {
  let premiumBadge = order.isPremium ? '<span style="color:var(--gold);font-weight:bold;">【优质订单】</span>' : '';
  let html = premiumBadge +
    '<div style="margin:10px 0;">' +
    '<p>平台：' + order.platform + '</p>' +
    '<p>起点：' + order.start + '（步行' + order.walkMin + 'min）</p>' +
    '<p>终点：' + order.end + '</p>' +
    '<p>里程：' + order.distance + 'km' + (order.isLuxury ? ' <span style="color:var(--warning);">豪车</span>' : '') + '</p>' +
    '<p>计费：' + order.mode + '</p>' +
    '<p style="font-size:18px;color:var(--gold);font-weight:bold;">预估收入：' + order.income + '元</p>' +
    '</div>';

  window._dispatchOrder = order;

  // 15秒倒计时
  let timeout = 15;
  let timer = setInterval(function() {
    timeout--;
    let btn = document.getElementById('dispatch-timer-btn');
    if (btn) btn.textContent = '不接（' + timeout + 's）';
    if (timeout <= 0) {
      clearInterval(timer);
      window._dispatchTimer = null;
      let o = window._dispatchOrder;
      if (o && !G.currentOrder) {
        let p = G.platforms[o.platform];
        p.rejectCount7++;
        p.rejectCount30++;
        if (p.rejectCount7 >= 10) { p.serviceScore = Math.max(0, p.serviceScore - 10); p.rejectCount7 = 0; }
        if (p.rejectCount30 >= 50) { p.daijiaScore = Math.max(0, p.daijiaScore - 2); p.rejectCount30 = 0; }
        addLog('⏭️ 派单超时，自动取消' + o.platform + '订单', 'info');
      }
      closeModal();
      updateStatusBar(); renderScoreDisplay();
    }
  }, 1000);
  window._dispatchTimer = timer;

  showModal('新订单派送', html, [
    {text:'接单', cls:'btn-success', action: function(){
      clearInterval(window._dispatchTimer);
      window._dispatchTimer = null;
      let o = window._dispatchOrder;
      G.currentOrder = o;
      G.platforms[o.platform].hasOrder = true;
      addLog('✅ 接到' + o.platform + '派单！' + o.start + '→' + o.end, 'good');
      closeModal();
      updateStatusBar(); renderMainMenu(); saveGame();
    }},
    {text:'不接（15s）', cls:'btn-secondary', id:'dispatch-timer-btn', action: function(){
      clearInterval(window._dispatchTimer);
      window._dispatchTimer = null;
      let o = window._dispatchOrder;
      let p = G.platforms[o.platform];
      p.rejectCount7++;
      p.rejectCount30++;
      if (p.rejectCount7 >= 10) {
        p.serviceScore = Math.max(0, p.serviceScore - 10);
        p.rejectCount7 = 0;
        addLog('📉 7天拒绝10次，服务分-10', 'bad');
      }
      if (p.rejectCount30 >= 50) {
        p.daijiaScore = Math.max(0, p.daijiaScore - 2);
        p.rejectCount30 = 0;
        addLog('📉 30天拒绝50次，代驾分-2', 'bad');
      }
      addLog('⏭️ 拒绝了' + o.platform + '派单', 'info');
      closeModal();
      updateStatusBar();
      renderScoreDisplay();
    }}
  ], null, true);
}

function startFulfillment(order) {
  // 取送车订单不触发任何事件
  if (order.mode === '取送车') {
    startDriving(order);
    return;
  }
  // 代泊车订单：跳过特殊事件，但保留车损检查
  if (order.mode.indexOf('代泊车') === 0) {
    // 代泊车车损检查
    if (G.player.drive < 100) {
      let dmgInfo = calcVehicleDamage(false, G.player.drive);
      if (chance(dmgInfo.chance)) {
        let damage = randInt(dmgInfo.minDmg, dmgInfo.maxDmg);
        // 保上保检查
        if (G[order.platform + '_baoShangBao'] && getGameDayIndex() <= G[order.platform + '_baoShangBao']) {
          let p = G.platforms[order.platform];
          p.serviceScore = Math.max(0, p.serviceScore - 5);
          G[order.platform + '_baoShangBaoAccidents'] = (G[order.platform + '_baoShangBaoAccidents'] || 0) + 1;
          addLog('🛡️ 保上保生效！代泊车车损免赔，服务分-5', 'good');
        } else {
          // 无保上保，私了/理赔选择
          let hasPlatform = order.platform && G.platforms[order.platform] && G.platforms[order.platform].joined;
          let html2 = '<p style="color:var(--danger);">代泊车中发生事故，赔偿金额：' + damage + '元</p>';
          html2 += '<p style="font-size:13px;margin-top:8px;">请选择处理方式：</p>';
          html2 += '<p style="font-size:12px;color:var(--text-secondary);">① 私了：承担全部' + damage + '元，平台不扣分</p>';
          if (hasPlatform) {
            html2 += '<p style="font-size:12px;color:var(--text-secondary);">② 平台理赔：您承担20%（最多1500元），' + order.platform + '扣6代驾分+10服务分</p>';
          }
          let buttons2 = [
            {text:'私了（' + damage + '元）', cls:'btn-warning', action: function(){
              closeModal();
              G.player.money -= damage; G.totalExpense += damage;
              addExpenseRecord('车损赔偿', damage);
              addLog('💥 代泊车事故私了，赔偿' + damage + '元', 'bad');
              startDriving(order);
            }}
          ];
          if (hasPlatform) {
            buttons2.push({text:'平台理赔（承担20%）', cls:'btn-danger', action: function(){
              closeModal();
              let userDamage = Math.min(Math.ceil(damage * 0.2), 1500);
              G.player.money -= userDamage; G.totalExpense += userDamage;
              addExpenseRecord('车损赔偿', userDamage);
              let p2 = G.platforms[order.platform];
              p2.daijiaScore = Math.max(0, p2.daijiaScore - 6);
              p2.serviceScore = Math.max(0, p2.serviceScore - 10);
              addLog('💥 代泊车事故理赔，赔偿' + userDamage + '元，代驾分-6，服务分-10', 'bad');
              if (p2.daijiaScore <= 0) { handleDaijiaScoreZero(order.platform); } else { startDriving(order); }
            }});
          }
          showModal('事故处理', html2, buttons2);
          return;
        }
      }
    }
    startDriving(order);
    return;
  }

  // 恶劣天气受伤检查
  if ((G.weather === '下雨' || G.weather === '下雪') && chance(5) && !G.injured) {
    G.injured = true;
    G.injuredUntilDay = getGameDayIndex() + 7; // 7天后恢复
    G.player.money += 1000; // 保险赔付
    addLog('🏥 恶劣天气受伤！保险赔付1000元，休息7天', 'bad');
    showModal('受伤了！', '<p style="color:var(--danger);">恶劣天气导致受伤！</p><p>保险赔付1000元</p><p>需要休息7天才能继续接单</p>', [{
      text:'休息', cls:'btn-primary', action: function(){
        closeModal();
        // 直接跳到第8天
        let daysToSkip = 7;
        advanceTime(daysToSkip * 24 * 60);
        G.injured = false;
        G.injuredUntilDay = -1;
        addLog('💪 伤势恢复，可以继续接单了！', 'good');
        updateStatusBar(); renderMainMenu(); saveGame();
      }
    }]);
    return;
  }

  // 取回代步车
  if (G.hasBike && !G.bikeAvailable) {
    G.bikeAvailable = true;
    G.bikeLocation = G.currentLocation;
    addLog('🚲 取回代步车', 'info');
  }

  // 前往起点
  let travelTime = G.hasBike && G.bikeAvailable ? order.bikeMin : order.walkMin;
  let method = G.hasBike && G.bikeAvailable ? '骑车' : '步行';
  advanceTime(travelTime);
  addLog('🚴 ' + method + '前往' + order.start + '，耗时' + travelTime + '分钟', 'info');

  // 乘客消单检查
  if (travelTime > 5 && Math.random() < 0.4) {
    addLog('❌ 到达起点后乘客取消了订单', 'bad');
    showModal('乘客消单', '<p style="color:var(--danger);">您到达起点后，乘客取消了订单！</p><p style="font-size:12px;color:var(--text-secondary);">接驾时长正常计算</p>', [
      {text:'确定', cls:'btn-primary', action: function(){
        closeModal();
        G.currentOrder = null;
        if (order.platform) G.platforms[order.platform].hasOrder = false;
        updateStatusBar(); renderMainMenu(); saveGame();
        // 10%概率触发空驶补贴外呼
        if (order.platform && Math.random() < 0.1) {
          let subsidy = randInt(5, 10);
          let pk = order.platform;
          addLog('📞 ' + pk + '客服来电：空驶补贴' + subsidy + '元', 'good');
          showModal('客服外呼', '<p>📞 ' + pk + '平台客服来电：</p><p>"师傅您好，识别到乘客取消订单，已为您准备' + subsidy + '元空驶补贴，继续做单吧！"</p>', [{text:'继续做单', cls:'btn-primary', action: function(){
            G.player.money += subsidy; G.totalIncome += subsidy;
            addIncomeRecord('平台订单', subsidy);
            addLog('💰 收到' + pk + '空驶补贴+' + subsidy + '元', 'good');
            closeModal(); updateStatusBar(); renderMainMenu(); saveGame();
          }}, {text:'知道了', cls:'btn-secondary', action: closeModal}]);
        }
      }}
    ]);
    return;
  }
  // 前往时间<=5分钟时10%概率消单
  else if (travelTime <= 5 && Math.random() < 0.1) {
    addLog('❌ 乘客取消了订单', 'bad');
    showModal('乘客消单', '<p style="color:var(--danger);">乘客取消了订单！</p>', [
      {text:'确定', cls:'btn-primary', action: function(){
        closeModal();
        G.currentOrder = null;
        if (order.platform) G.platforms[order.platform].hasOrder = false;
        updateStatusBar(); renderMainMenu(); saveGame();
        // 10%概率触发空驶补贴外呼
        if (order.platform && Math.random() < 0.1) {
          let subsidy = randInt(5, 10);
          let pk = order.platform;
          addLog('📞 ' + pk + '客服来电：空驶补贴' + subsidy + '元', 'good');
          showModal('客服外呼', '<p>📞 ' + pk + '平台客服来电：</p><p>"识别到乘客取消订单，已为您准备' + subsidy + '元空驶补贴，继续做单吧！"</p>', [{text:'继续做单', cls:'btn-primary', action: function(){
            G.player.money += subsidy; G.totalIncome += subsidy;
            addIncomeRecord('平台订单', subsidy);
            addLog('💰 收到' + pk + '空驶补贴+' + subsidy + '元', 'good');
            closeModal(); updateStatusBar(); renderMainMenu(); saveGame();
          }}, {text:'知道了', cls:'btn-secondary', action: closeModal}]);
        }
      }}
    ]);
    return;
  }

  // 更新在线时长
  let p = G.platforms[order.platform];
  p.onlineMinutesToday += travelTime;

  // 服务分+0.5
  p.serviceScore = Math.min(100, p.serviceScore + 0.5);

  // 代步车放置事件（有代步车时30%触发）
  if (G.hasBike && G.bikeAvailable && chance(30)) {
    showModal('乘客不让放代步车', '<p>乘客表示后备箱已满/不方便放置代步车。</p>', [
      {text:'取消订单', cls:'btn-danger', action: function(){
        closeModal();
        // 取消订单逻辑
        let p2 = G.platforms[order.platform];
        p2.rejectCount7++;
        p2.rejectCount30++;
        if (p2.rejectCount7 >= 10) { p2.serviceScore = Math.max(0, p2.serviceScore - 10); p2.rejectCount7 = 0; }
        if (p2.rejectCount30 >= 50) { p2.daijiaScore = Math.max(0, p2.daijiaScore - 2); p2.rejectCount30 = 0; }
        G.currentOrder = null;
        p2.hasOrder = false;
        addLog('🚫 因代步车问题取消订单', 'bad');
        updateStatusBar(); renderMainMenu(); saveGame();
      }},
      {text:'把代步车放在原地', cls:'btn-warning', action: function(){
        closeModal();
        if (chance(10)) {
          G.hasBike = false;
          G.bikeAvailable = false;
          G.bikeLocation = '已丢失';
          addLog('😱 代步车丢失了！', 'bad');

function calcVehicleDamage(isLuxury, driveSkill) {
  // 返回 {chance: 概率百分比, minDmg: 最小赔偿, maxDmg: 最大赔偿} 或 null
  if (isLuxury) {
    if (driveSkill < 40) return {chance: 10, minDmg: 300, maxDmg: 5000};
    if (driveSkill < 60) return {chance: 5, minDmg: 300, maxDmg: 5000};
    if (driveSkill < 80) return {chance: 3, minDmg: 200, maxDmg: 4000};
    return {chance: 1, minDmg: 200, maxDmg: 3000};
  } else {
    if (driveSkill < 30) return {chance: 5, minDmg: 100, maxDmg: 3000};
    if (driveSkill < 50) return {chance: 3, minDmg: 100, maxDmg: 3000};
    if (driveSkill < 80) return {chance: 1, minDmg: 100, maxDmg: 3000};
    return {chance: 0.5, minDmg: 100, maxDmg: 2000};
  }
}

function applyDamagePenalty(platform) {
  if (!platform) return false; // 报单不扣分
  let p = G.platforms[platform];
  if (p && p.joined) {
    p.daijiaScore = Math.max(0, p.daijiaScore - 6);
    p.serviceScore = Math.max(0, p.serviceScore - 10);
    addLog('📉 车损，' + platform + '代驾分-6，服务分-10', 'bad');
    G._monthPenaltyCount = (G._monthPenaltyCount || 0) + 1;
    if (p.daijiaScore <= 0) {
      handleDaijiaScoreZero(platform);
      return true; // 触发了归零处理，调用方不应再弹事故弹窗
    }
  }
  return false;
}

function finishDriving(order) {
  let p = G.platforms[order.platform];
  // 设置实际行驶距离 = 最终预估里程（含途经点增加）+ 随机偏差
  if (!order.actualDistance) {
    let deviation = 1 + (Math.random() * 0.2 - 0.1); // ±10%偏差
    order.actualDistance = Math.max(1, Math.round(order.distance * deviation));
  }
  // 时间计算
  let isBaoShi = order.mode && (order.mode.indexOf('包时') === 0 || order.mode.indexOf('万能司机') === 0 || order.mode.indexOf('代泊车') === 0);
  let isCrossCity = order.crossCity;
  let driveTime;
  if (isBaoShi) {
    // 包时/万能司机/代泊车 = 套餐时长
    let hoursMatch = order.mode.match(/\((\d+\.?\d*)H\)/);
    driveTime = hoursMatch ? Math.round(parseFloat(hoursMatch[1]) * 60) : 60;
  } else {
    // 实时计费/一口价/跨城/取送车 = 实际行驶里程/行驶速度
    let speed; // km/h
    if (isCrossCity) {
      speed = 60;
    } else {
      // 同城默认30km/h，高峰期（早8-10、晚17-20）15km/h
      let t = getGameTime();
      if ((t.h >= 8 && t.h < 10) || (t.h >= 17 && t.h < 20)) {
        speed = 15;
      } else {
        speed = 30;
      }
    }
    driveTime = Math.max(10, Math.floor(order.actualDistance / speed * 60));
  }
  advanceTime(driveTime);

  // 到达终点事件
  if (chance(70)) {
    let html = '<p>乘客要求送到指定停车位。</p>';
    showModal('到达终点 - 指定停车位', html, [
      {text:'送到指定车位', cls:'btn-success', action: function(){
        closeModal();
        advanceTime(10);
        if (chance(90)) {
          p.serviceScore = Math.min(100, p.serviceScore + 0.5);
          addLog('👍 送到指定车位，服务分+0.5', 'good');
        }
        completeOnlineOrder(order);
      }},
      {text:'直接离开', cls:'btn-danger', action: function(){
        closeModal();
        if (chance(80)) {
          p.daijiaScore = Math.max(0, p.daijiaScore - 6);
          addLog('😡 未送到位，代驾分-6', 'bad');
          if (p.daijiaScore <= 0) { handleDaijiaScoreZero(order.platform); return; }
        }
        completeOnlineOrder(order);
      }}
    ]);
  } else {
    completeOnlineOrder(order);
  }
}

function completeOnlineOrder(order) {
  let p = G.platforms[order.platform];

  // 红包打赏
  let tip = 0;
  if (order.hasRedPacket) {
    tip = randInt(0, 100);
    addLog('🧧 收到红包打赏' + tip + '元！', 'good');
  }

  let totalIncome = order.income + tip;
  // 超值免佣包
  if (G[order.platform + '_mianYong'] && getGameDayIndex() <= G[order.platform + '_mianYong']) {
    let bonus = Math.floor(totalIncome * 0.2);
    totalIncome += bonus;
    addLog('💰 免佣包加成+' + bonus + '元', 'good');
    showModal('免佣包', '<p style="color:var(--success);">超值免佣包生效！本单额外收入+' + bonus + '元</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]);
  }
  G.player.money += totalIncome;
  G.monthlyIncome += totalIncome;
  G.totalIncome += totalIncome;
  addIncomeRecord('平台订单', totalIncome);
  G.totalOrders++;
  // 冲单奖励：单平台当日10单以上
  let todayKey = 'rush_' + getGameDayIndex() + '_' + order.platform;
  G[todayKey] = (G[todayKey] || 0) + 1;
  if (G[todayKey] === 11) {
    G.player.money += 10; G.totalIncome += 10;
    addIncomeRecord('平台订单', 10);
    addLog('🎉 ' + order.platform + '冲单奖励！今日第11单，额外+10元', 'good');
    showModal('冲单奖励', '<p style="color:var(--success);">' + order.platform + '今日完成11单！冲单奖励+10元！</p>', [{text:'太棒了',cls:'btn-primary',action:closeModal}]);
  }
  p.monthlyOrders++;
  G._monthPlatformOrders = (G._monthPlatformOrders || 0) + 1;
  if (order.isLuxury) {
    G._monthLuxuryOrders = (G._monthLuxuryOrders || 0) + 1;
  }

  // 35%概率好评
  let gotReview = chance(35);
  if (gotReview) {
    p.serviceScore = Math.min(100, p.serviceScore + 1);
    addLog('⭐ 获得好评！服务分+1', 'good');
  }

  // 10%概率差评
  if (chance(10)) {
    let p2 = G.platforms[order.platform];
    p2.serviceScore = Math.max(0, p2.serviceScore - 1);
    addLog('⭐ 收到差评，' + order.platform + '服务分-1', 'bad');
  }

  // 更新当前地点为订单终点
  if (order.end) {
    if (order.crossCity && order.endCity) {
      G.player.city = order.endCity;
      let endLandmarks = randLandmarks(order.endCity, 1);
      G.currentLocation = endLandmarks.length > 0 ? endLandmarks[0] : order.endCity;
    } else {
      G.currentLocation = order.end;
    }
  }

  // 跨城单：索要返程高铁票
  if (order.crossCity) {
    let html = '<p>乘客下车后，您是否向乘客索要返程高铁票钱（500元）？</p>';
    showModal('返程高铁票', html, [
      {text:'索要（话术>75才有利）', cls:'btn-warning', action: function(){
        closeModal();
        if (G.player.talk >= 75) {
          if (Math.random() < 0.6) {
            // 60%同意
            G.player.money += 500; G.totalIncome += 500;
            addIncomeRecord('平台订单', 500);
            addLog('💰 乘客同意支付返程高铁票500元', 'good');
            showModal('乘客同意', '<p style="color:var(--success);">乘客同意支付返程高铁票500元！</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]);
          } else {
            // 40%拒绝
            if (Math.random() < 0.5) {
              // 50%被平台识别
              let p = G.platforms[order.platform];
              if (p && p.joined) {
                p.daijiaScore = Math.max(0, p.daijiaScore - 4);
                p.serviceScore = Math.max(0, p.serviceScore - 10);
                addLog('🚨 索要被平台识别！代驾分-4，服务分-10', 'bad');
                showModal('被识别', '<p style="color:var(--danger);">平台识别到您索要返程费！代驾分-4，服务分-10</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]);
              }
            } else {
              // 50%差评
              let p = G.platforms[order.platform];
              if (p && p.joined) p.serviceScore = Math.max(0, p.serviceScore - 5);
              addLog('😡 乘客给差评，服务分-5', 'bad');
              showModal('差评', '<p style="color:var(--danger);">乘客给了差评！服务分-5</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]);
            }
          }
        } else {
          // 话术<75，直接被识别
          let p = G.platforms[order.platform];
          if (p && p.joined) {
            p.daijiaScore = Math.max(0, p.daijiaScore - 4);
            p.serviceScore = Math.max(0, p.serviceScore - 10);
          }
          addLog('🚨 话术不足，索要被识别！代驾分-4，服务分-10', 'bad');
          showModal('被识别', '<p style="color:var(--danger);">话术不足，平台识别到您索要返程费！代驾分-4，服务分-10</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]);
        }
      }},
      {text:'不索要', cls:'btn-secondary', action: function(){
        closeModal();
        let p = G.platforms[order.platform];
        if (p && p.joined) p.serviceScore = Math.min(100, p.serviceScore + 0.5);
        if (Math.random() < 0.7) {
          addLog('😊 乘客好评！服务分+0.5', 'good');
          showModal('好评', '<p style="color:var(--success);">乘客给了好评！服务分+0.5</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]);
        } else {
          let tip = randInt(100, 500);
          G.player.money += tip; G.totalIncome += tip;
          addIncomeRecord('平台订单', tip);
          addLog('🎁 乘客主动打赏' + tip + '元！', 'good');
          showModal('打赏', '<p style="color:var(--success);">乘客主动打赏' + tip + '元！</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]);
        }
      }}
    ]);
  }

  G.currentOrder = null;
  p.hasOrder = false;

  addLog('💰 完成' + order.platform + '订单，收入' + totalIncome + '元', 'good');

  // 非包时订单超里程差评检查
  if (order.mode !== '包时' && order.mode.indexOf('包时') !== 0 && order.actualDistance && order.distance) {
    let overRatio = (order.actualDistance - order.distance) / order.distance;
    if (overRatio >= 0.2 && chance(30)) {
      p.serviceScore = Math.max(0, p.serviceScore - 5);
      addLog('😡 实际里程超出预估20%+，乘客差评！服务分-5', 'bad');
    }
  }

  // 回头客逻辑
  let isReturnCustomer = false;
  if (order.mode && order.mode.indexOf('包时') === 0) {
    // 包时订单：检查是否24H以上
    let hoursMatch = order.mode.match(/包时\((\d+\.?\d*)H\)/);
    if (hoursMatch && parseFloat(hoursMatch[1]) >= 24) {
      isReturnCustomer = chance(10);
    }
  }
  // 报单回头客20%
  // （报单的回头客在 finishOfflineOrder 中处理）
  
  if (isReturnCustomer) {
    let triggerMonth = getGameMonthIndex() + 1; // 7天后约1个月
    G.returnCustomers.push({ name: order.start + '乘客', location: order.start, triggerMonth });
    addLog('👤 乘客成为回头客！7天后可能联系您', 'good');
  }

  let html = '<p style="color:var(--success);font-size:16px;font-weight:bold;">订单完成！</p>' +
    '<div style="margin:12px 0;">' +
    '<p>平台：' + order.platform + '</p>' +
    '<p>路线：' + order.start + ' → ' + order.end + '</p>' +
    '<p>里程：' + order.distance + 'km</p>' +
    '<p>计费：' + order.mode + '</p>' +
    '<p style="font-size:18px;color:var(--gold);font-weight:bold;">收入：' + totalIncome + '元' + (tip > 0 ? '（含红包' + tip + '元）' : '') + '</p>' +
    (gotReview ? '<p style="color:var(--success);">获得好评！服务分+1</p>' : '') +
    '</div>';

  showModal('订单完成', html, [{text:'确定', cls:'btn-primary', action: function(){
    closeModal();
    updateStatusBar();
    renderScoreDisplay();
    renderMainMenu();
    saveGame();
  }}]);

  // 每日某平台10单以上额外+3服务分
  let dayKey = 'dayOrders_' + getGameDayIndex() + '_' + order.platform;
  G[dayKey] = (G[dayKey] || 0) + 1;
  if (G[dayKey] === 11) {
    p.serviceScore = Math.min(100, p.serviceScore + 3);
    addLog('🏆 今日' + order.platform + '完成11单，服务分+3', 'good');
  }

  // 作弊器识别检查
  if (G.hasCheater && order.platform) {
    if (Math.random() < 0.6) {
      let p = G.platforms[order.platform];
      p.daijiaScore = Math.max(0, p.daijiaScore - 3);
      G.hasCheater = false;
      addLog('🚫 ' + order.platform + '识别到作弊器使用！代驾分-3，作弊器失效', 'bad');
      showModal('作弊识别', '<p style="color:var(--danger);">' + order.platform + '平台检测到您使用了作弊器！</p><p>代驾分-3，作弊器已失效</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]);
      if (p.daijiaScore <= 0) { handleDaijiaScoreZero(order.platform); }
    }
  }

  // 订单结束后检查是否需要补觉
  let todaySleep = G._todaySleepMinutes || 0;
  if (todaySleep < 5 * 60) {
    let t = getGameTime();
    if (t.h >= 19) {
      let sleepNeeded = 5 * 60 - todaySleep;
      let minutesInDay = G.time % (24 * 60);
      let minutesToMidnight = (24 * 60) - minutesInDay + 1;
      let actualSleep = Math.min(sleepNeeded, minutesToMidnight);
      G._todaySleepMinutes = todaySleep + actualSleep;
      G.time += actualSleep;
      // 补觉跨日，重置平台听单时长
      for (let pk of ['DD','GD','E']) {
        G.platforms[pk].onlineMinutesToday = 0;
        if (G.platforms[pk].listening) {
          G.platforms[pk].listening = false;
          G.platforms[pk]._listenStartGameMinutes = null;
          stopDispatchTimer(pk);
        }
      }
      addLog('😴 订单结束后扛不住了，强制休息到次日', 'info');
      showModal('强制休息', '<p>😴 扛不住了，我得睡会儿</p><p style="font-size:13px;">今日睡眠不足5小时，已强制休息至次日</p>', [{text:'确定', cls:'btn-primary', action: function(){ closeModal(); updateStatusBar(); renderMainMenu(); saveGame(); }}]);
    }
  }
}

function recalcOrderIncome(order) {
  if (!order.actualDistance) order.actualDistance = order.distance;
  if (!order.distance || order.distance <= 0) return;
  if (order.mode === '一口价') {
    let estimatedIncome = order.distance <= 5 ? 20 : 20 + (order.distance - 5) * 6;
    let diff = Math.abs(order.actualDistance - order.distance) / order.distance;
    if (diff < 0.15) {
      order.income = estimatedIncome;
    } else {
      order.income = order.actualDistance <= 5 ? 20 : 20 + (order.actualDistance - 5) * 6;
    }
  } else if (order.mode === '实时计费') {
    order.income = order.actualDistance <= 5 ? 25 : 25 + (order.actualDistance - 5) * 8;
  }
  // 包时和报单不重新计算
  order.income = Math.floor(order.income) + G.priceAdjust;
  let t = getGameTime();
  if ((t.h >= 0 && t.h < 4) && (order.mode === '一口价' || order.mode === '实时计费')) {
    order.income = Math.floor(order.income * 1.1);
  }
  if (isHoliday()) order.income += 5;
}

function handleDaijiaScoreZero(pk) {
  let p = G.platforms[pk];
  p.daijiaScore = 0;
  p.daijiaResetCount++;

  if (p.daijiaResetCount >= 2) {
    // 同周期第二次，被清退
    p.listening = false;
    p.kickedOutMonth = getGameMonthIndex();
    addLog('🚫 ' + pk + '代驾分归零，已被清退！', 'bad');
    showModal('被清退', '<p style="color:var(--danger);">' + pk + '代驾分归零，同周期内第二次，已被清退！</p>',
      [{text:'确定', cls:'btn-primary', action: function(){
        closeModal();
        G.currentOrder = null;
        p.hasOrder = false;
        updateStatusBar(); renderScoreDisplay(); renderMainMenu(); saveGame();
      }}]);
  } else {
    // 首次，花1000恢复3分
    showModal('代驾分归零', '<p style="color:var(--danger);">' + pk + '代驾分已归零！</p><p>是否花费1000元恢复3分？</p>', [
      {text:'花费1000元恢复', cls:'btn-warning', action: function(){
        if (G.player.money < 1000) {
          // 余额不足，直接清退
          p.listening = false;
          p.kickedOutMonth = getGameMonthIndex();
          addLog('🚫 余额不足，' + pk + '已被清退', 'bad');
          closeModal();
          showModal('被清退', '<p style="color:var(--danger);">余额不足1000元，' + pk + '已被清退！</p>',
            [{text:'确定', cls:'btn-primary', action: function(){
              closeModal();
              G.currentOrder = null;
              p.hasOrder = false;
              updateStatusBar(); renderScoreDisplay(); renderMainMenu(); saveGame();
            }}]);
          return;
        }
        G.player.money -= 1000;
        G.totalExpense += 1000;
        p.daijiaScore = 3;
        addLog('💸 花费1000元恢复' + pk + '代驾分至3分', 'warn');
        closeModal();
        G.currentOrder = null;
        p.hasOrder = false;
        updateStatusBar(); renderScoreDisplay(); renderMainMenu(); saveGame();
        checkMoneyNegative();
      }},
      {text:'放弃（被清退）', cls:'btn-danger', action: function(){
        p.listening = false;
        p.kickedOutMonth = getGameMonthIndex();
        addLog('🚫 放弃恢复，' + pk + '已被清退', 'bad');
        closeModal();
        G.currentOrder = null;
        p.hasOrder = false;
        updateStatusBar(); renderScoreDisplay(); renderMainMenu(); saveGame();
      }}
    ]);
  }
}

function showTraining() {
  let html = '';
  let wi = getGameWeekIndex();
  let mi = getGameMonthIndex();

  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    if (!p.joined || p.kickedOutMonth >= 0) continue;

    html += '<div class="platform-card"><h4>' + pk + '代驾</h4><div class="platform-info">';

    // 线上培训
    let quizDone = p.weeklyQuizDone;
    html += '<div>线上培训（本周）：<span>' + (quizDone ? '✅ 已完成' : '📝 未完成') + '</span></div>';
    if (!quizDone) {
      html += '<button class="btn-success btn-small" style="margin:4px 0;" onclick="startQuiz(\'' + pk + '\')">开始培训（3道题）</button><br>';
    }

    // 线下培训
    let offlineDone = p.lastTrainingMonth >= mi;
    html += '<div>线下培训（本月）：<span>' + (offlineDone ? '✅ 已完成' : '📝 未完成') + '</span></div>';
    if (!offlineDone) {
      html += '<button class="btn-warning btn-small" style="margin:4px 0;" onclick="doOfflineTraining(\'' + pk + '\')">参加线下培训（服务分+5）</button><br>';
    }

    html += '</div></div>';
  }

  showModal('培训中心', html, [{text:'关闭', cls:'btn-secondary', action:closeModal}]);
}

function startQuiz(pk) {
  // 随机选3道题
  let shuffled = QUIZ_BANK.slice().sort(() => Math.random() - 0.5);
  let questions = shuffled.slice(0, 3);
  window._quizQuestions = questions;
  window._quizIndex = 0;
  window._quizCorrect = 0;
  window._quizPlatform = pk;
  showQuizQuestion();
}

function showQuizQuestion() {
  let idx = window._quizIndex;
  let questions = window._quizQuestions;

  if (idx >= questions.length) {
    // 完成
    let correct = window._quizCorrect;
    let passed = correct >= 3; // 3道题全对才通过
    let pk = window._quizPlatform;

    if (passed) {
      G.platforms[pk].weeklyQuizDone = true;
      G.platforms[pk].serviceScore = Math.min(100, G.platforms[pk].serviceScore + 10);
      addLog('✅ ' + pk + '线上培训通过！服务分+10', 'good');
      showModal('培训完成', '<p style="color:var(--success);">恭喜通过！答对' + correct + '/3题</p>',
        [{text:'确定', cls:'btn-primary', action: function(){ closeModal(); showTraining(); }}]);
    } else {
      addLog('❌ ' + pk + '线上培训未通过，答对' + correct + '/3', 'bad');
      showModal('培训未通过', '<p style="color:var(--danger);">未通过，答对' + correct + '/3题（需3题全对）</p><p>可以重新尝试</p>',
        [{text:'重新测试', cls:'btn-warning', action: function(){ closeModal(); startQuiz(pk); }},
         {text:'返回', cls:'btn-secondary', action: function(){ closeModal(); showTraining(); }}]);
    }
    return;
  }

  let q = questions[idx];
  let html = '<p style="color:var(--text-secondary);margin-bottom:8px;">第' + (idx + 1) + '/3题</p>' +
    '<div class="quiz-question">' + q.q + '</div><div class="quiz-options">';
  q.opts.forEach((opt, i) => {
    if (opt) {
      html += '<button class="quiz-option" onclick="answerQuiz(' + i + ')">' + String.fromCharCode(65 + i) + '. ' + opt + '</button>';
    }
  });
  html += '</div>';

  showModal('线上培训', html, []);
}

function answerQuiz(selected) {
  let idx = window._quizIndex;
  let q = window._quizQuestions[idx];

  if (selected === q.ans) {
    window._quizCorrect++;
    // 标记正确
    let btns = document.querySelectorAll('.quiz-option');
    btns.forEach((btn, i) => {
      if (i === q.ans) btn.classList.add('correct');
      btn.disabled = true;
    });
  } else {
    let btns = document.querySelectorAll('.quiz-option');
    btns.forEach((btn, i) => {
      if (i === selected) btn.classList.add('wrong');
      if (i === q.ans) btn.classList.add('correct');
      btn.disabled = true;
    });
  }

  setTimeout(function() {
    window._quizIndex++;
    showQuizQuestion();
  }, 800);
}

function doOfflineTraining(pk) {
  let p = G.platforms[pk];
  advanceTime(120); // 2小时培训
  p.lastTrainingMonth = getGameMonthIndex();
  p.serviceScore = Math.min(100, p.serviceScore + 5);
  addLog('📚 完成' + pk + '线下培训，服务分+5', 'good');

  showModal('培训完成', '<p style="color:var(--success);">线下培训完成！服务分+5</p><p>耗时：2小时</p>',
    [{text:'确定', cls:'btn-primary', action: function(){ closeModal(); showTraining(); updateStatusBar(); renderScoreDisplay(); saveGame(); }}]);
}

function generateDriverCandidates(forceRefresh) {
  let currentMonthKey = 'driverCandidates_' + getGameMonthIndex();
  if (!forceRefresh && G[currentMonthKey]) {
    G.driverCandidates = G[currentMonthKey];
    return;
  }
  let allNames = [
    '甄嬛','沈眉庄','安陵容','华妃','皇后','端妃','敬妃','槿汐','流朱','浣碧','温实初','果郡王','苏培盛','夏冬春','齐妃',
    '佟湘玉','白展堂','郭芙蓉','吕秀才','李大嘴','莫小贝','邢捕头','燕小六','无双','老邢','小米','钱掌柜','祝无双',
    '海绵宝宝','派大星','章鱼哥','蟹老板','珊迪','痞老板','小蜗','泡芙老师','蟹阿金','拉里','珍珍','凯伦','老痞','比奇堡',
    '孙悟空','唐僧','猪八戒','沙僧','白龙马','牛魔王','铁扇公主','红孩儿','二郎神','哪吒','观音','如来佛祖','太白金星','镇元子',
    '武松','林冲','鲁智深','李逵','宋江','吴用','花荣','杨志','戴宗','张顺','阮小二','孙二娘','顾大嫂','扈三娘','时迁',
    '刘备','关羽','张飞','诸葛亮','赵云','曹操','周瑜','吕布','貂蝉','孙权','黄忠','马超','姜维','司马懿','庞统'
  ];
  // 随机选5个不重复的
  let shuffled = allNames.sort(function() { return Math.random() - 0.5; });
  let selectedNames = shuffled.slice(0, 5);

  let candidates = [];
  for (let i = 0; i < 5; i++) {
    let age = randInt(25, 55);
    let exp = randInt(1, Math.max(1, age - 18));
    let platforms = ['无','DD','GD','E'];
    candidates.push({
      name: selectedNames[i],
      age: age, exp: exp,
      platform: platforms[randInt(0, 3)],
      hometown: generateNPC().hometown,
      dailyOrders: randInt(1, 30),
      drive: randInt(10, 50),
      luxury: randInt(5, 30),
      talk: randInt(10, 40),
      rejected: false
    });
  }
  G.driverCandidates = candidates;
  G[currentMonthKey] = G.driverCandidates;
}

function showBossManage() {
  generateDriverCandidates();

  let html = '<h4>我的司机（' + G.drivers.length + '人）</h4>';
  if (G.drivers.length === 0) {
    html += '<p style="color:var(--text-secondary);">暂无司机</p>';
  } else {
    G.drivers.forEach(function(d, i) {
      let driverAge = d.age + Math.floor((getGameMonthIndex() - d.recruitMonth) / 12);
      let monthsWorked = getGameMonthIndex() - d.contractStartMonth;
      let monthsLeft = d.contractMonths - monthsWorked;
      let contractInfo = monthsLeft > 0 ? ' 合同剩' + monthsLeft + '月' : ' 合同已到期';
      let yearsWorked = Math.ceil(monthsWorked / 12);
      let severanceCost = yearsWorked * 10000;
      let renewBtn = '';
      if (monthsLeft <= 3 && monthsLeft > 0) {
        renewBtn = '<button class="btn-success btn-small" onclick="showRenewContract(' + i + ')">续签</button>';
      }
      let recommendBtn = '';
      let currentMonthInYear = getGameDate().month;
      if ((currentMonthInYear >= 11 || currentMonthInYear <= 2) && !d.recommended) {
        recommendBtn = '<button class="btn-primary btn-small" onclick="recommendDriver(' + i + ')">推荐到平台</button>';
      }
      html += '<div class="npc-item"><span class="npc-desc">' + d.name + ' ' + driverAge + '岁 驾龄' + d.exp + '年 日均' + d.dailyOrders + '单' + contractInfo + '</span>' +
        '<button class="btn-warning btn-small" onclick="showDriverInteract(' + i + ')">互动</button>' +
        renewBtn +
        recommendBtn +
        '<button class="btn-danger btn-small" onclick="dismissDriver(' + i + ')">辞退（' + severanceCost + '元）</button></div>';
    });
  }

  html += '<hr style="border-color:var(--border);margin:12px 0;">';
  html += '<p style="font-size:12px;color:var(--text-secondary);">当前司机名额：' + G.drivers.length + '/' + G.bossDriverSlots + '</p>';
  if (G.drivers.length >= G.bossDriverSlots) {
    html += '<button class="btn-warning btn-small" onclick="expandDriverSlots()">追缴保证金扩容（10000元/名额）</button>';
  }
  html += '<hr style="border-color:var(--border);margin:12px 0;">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;">';
  html += '<h4>可招募司机</h4>';
  html += '<button class="btn-warning btn-small" onclick="changeDriverBatch()">换一批（15000元）</button>';
  html += '</div>';
  let available = G.driverCandidates.filter(function(c) { return !c.rejected; });
  if (available.length === 0) {
    html += '<p style="color:var(--text-secondary);">暂无可招募司机，请换一批</p>';
  } else {
    let recruitCost = G.player.talk >= 75 ? 8000 : 10000;
    available.forEach(function(c) {
      let idx = G.driverCandidates.indexOf(c);
      html += '<div class="npc-item"><span class="npc-desc">' + c.name + ' ' + c.age + '岁 驾龄' + c.exp + '年 ' + c.platform + ' 日均' + c.dailyOrders + '单</span>' +
        '<button class="btn-success btn-small" onclick="recruitDriver(' + idx + ')">招募（' + recruitCost + '元）</button></div>';
    });
  }

  showModal('包工头管理', html, [{text:'返回', cls:'btn-secondary', action:closeModal}]);
}

function recruitDriver(idx) {
  let c = G.driverCandidates[idx];
  let cost = G.player.talk >= 75 ? 8000 : 10000;
  if (G.player.money < cost) { showModal('余额不足', '<p>需要' + cost + '元</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]); return; }
  G.player.money -= cost; G.totalExpense += cost;
  G.drivers.push({name:c.name, age:c.age, exp:c.exp, platform:c.platform, hometown:c.hometown,
    dailyOrders:c.dailyOrders, drive:c.drive, luxury:c.luxury, talk:c.talk,
    recruitMonth: getGameMonthIndex(), contractMonths: 12, contractStartMonth: getGameMonthIndex(), lastInteractMonth: -1, dailyOrderBonus: 0});
  G.driverCandidates.splice(idx, 1);
  addLog('👔 招募司机' + c.name + '，花费' + cost + '元', 'good');
  updateStatusBar(); showBossManage(); saveGame();
}

function skipDriver(idx) {
  G.driverCandidates[idx].rejected = true;
  showBossManage();
}

function dismissDriver(idx) {
  let d = G.drivers[idx];
  if (!d) return;
  let monthsWorked = getGameMonthIndex() - d.contractStartMonth;
  let severanceCost = Math.ceil(monthsWorked / 12) * 10000;
  showModal('确认辞退', '<p>确定辞退司机' + d.name + '吗？</p><p style="color:var(--danger);">需支付辞退补偿：' + severanceCost + '元（已工作' + monthsWorked + '个月）</p>', [
    {text:'确认辞退', cls:'btn-danger', action: function(){
      if (G.player.money < severanceCost) { showModal('余额不足', '<p>需要' + severanceCost + '元</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]); return; }
      G.player.money -= severanceCost; G.totalExpense += severanceCost;
      addLog('👋 辞退司机' + d.name + '，补偿' + severanceCost + '元', 'bad');
      G.drivers.splice(idx, 1);
      closeModal(); updateStatusBar(); showBossManage(); saveGame();
    }},
    {text:'取消', cls:'btn-secondary', action: closeModal}
  ]);
}

function showRenewContract(idx) {

function redeemFundAll() {
  if (!G.fundTotal || G.fundTotal.amount <= 0) return;
  let value = G.fundTotal.currentValue;
  G.player.money += value; G.totalIncome += value;
  let profit = value - G.fundTotal.amount;
  if (profit > 0) addIncomeRecord('基金股票', profit);
  let profitText = profit >= 0 ? '+' + profit : '' + profit;
  addLog('📈 赎回全部基金股票，获得' + value + '元（' + profitText + '）', profit >= 0 ? 'good' : 'bad');
  G.fundTotal = { amount: 0, currentValue: 0, lastProcessDay: -1 };
  updateStatusBar(); showFinanceMenu(); saveGame();
}

function processFinanceDaily() {
  if (!G.financeProducts) return;
  let today = getGameDayIndex();

  // 基金股票统一处理（合并计算）
  if (G.fundTotal && G.fundTotal.amount > 0 && G.fundTotal.lastProcessDay < today) {
    G.fundTotal.lastProcessDay = today;
    if (Math.random() < 0.55) {
      let drop = 1 - (randFloat(0.5, 5) / 100);
      G.fundTotal.currentValue = Math.floor(G.fundTotal.currentValue * drop);
    } else {
      let rise = 1 + (randFloat(0.5, 5) / 100);
      G.fundTotal.currentValue = Math.floor(G.fundTotal.currentValue * rise);
    }
  }
  
  G.financeProducts.forEach(fp => {
    if (fp.type === 'bank') {
      // 银行理财：每天减少1天
      fp.daysLeft--;
      if (fp.daysLeft <= 0) {
        let profit = Math.floor(fp.amount * fp.rate / 100);
        G.player.money += fp.amount + profit; G.totalIncome += fp.amount + profit;
        G._currentMonthFinanceIncome = (G._currentMonthFinanceIncome || 0) + profit;
        addIncomeRecord('银行理财', profit);
        addLog('🏦 银行理财到期！返还本金' + fp.amount + '元 + 收益' + profit + '元', 'good');
        fp.expired = true;
      }
    } else if (fp.type === 'fund') {
      // 基金股票已合并到 G.fundTotal，此处不再处理单项
    }
  });
  
  // 移除过期的银行理财
  let beforeLen = G.financeProducts.length;
  G.financeProducts = G.financeProducts.filter(fp => !fp.expired);

  // 银行VIP代驾服务
  if (G.bankVIPActive && Math.random() < 0.15) {
    let bankOrdersToday = G._bankOrdersToday || 0;
    if (bankOrdersToday < 3) {
      let distance = randInt(1, 20);
      let income = distance <= 5 ? 20 : 20 + (distance - 5) * 6;
      G.player.money += income; G.totalIncome += income; G.monthlyIncome += income; G.totalOrders++;
      addIncomeRecord('银行VIP服务', income);
      G._bankOrdersToday = bankOrdersToday + 1;
      addLog('🏦 银行VIP代驾服务，' + distance + 'km，收入' + income + '元', 'good');
      // 仍有概率触发车损
      if (G.player.drive < 100) {
        let dmgInfo = calcVehicleDamage(false, G.player.drive);
        if (chance(dmgInfo.chance)) {
          let damage = randInt(dmgInfo.minDmg, dmgInfo.maxDmg);
          G.player.money -= damage; G.totalExpense += damage;
          addLog('💥 银行VIP服务中车损，赔偿' + damage + '元', 'bad');
        }
      }
    }
  }
}

function doNap(hours) {
  advanceTime(hours * 60);
  recordSleep(hours);
  addLog('😴 小睡' + hours + '小时', 'info');
  closeModal(); updateStatusBar(); renderMainMenu(); saveGame();
}

function recordSleep(hours) {
  let d = getGameDate();
  let dayKey = d.year + '-' + d.month + '-' + d.day;
  if (!G.sleepRecord) G.sleepRecord = {};
  G.sleepRecord[dayKey] = (G.sleepRecord[dayKey] || 0) + hours;
  G._todaySleepMinutes = (G._todaySleepMinutes || 0) + Math.round(hours * 60);
}

function checkSleepHealth() {
  if (!G.sleepRecord) return;
  let days = Object.keys(G.sleepRecord);
  if (days.length < 30) return;
  let recentDays = days.slice(-30);
  let badSleepDays = recentDays.filter(d => G.sleepRecord[d] < 6).length;
  if (badSleepDays >= 5 && Math.random() < 0.5) {
    let cost = randInt(300, 2000);
    G.player.money -= cost; G.totalExpense += cost;
    addLog('🤒 生病了！看病花费' + cost + '元', 'bad');
    showModal('生病了', '<p style="color:var(--danger);">近期睡眠不足，生病了！</p><p>看病花费' + cost + '元</p>', [{text:'注意身体', cls:'btn-primary', action:closeModal}]);
  }
}

function showMonthlyReport() {
  let d = getGameDate();
  let prevMonth = d.month === 1 ? 12 : d.month - 1;
  let prevYear = d.month === 1 ? d.year - 1 : d.year;

  // 称号检查
  let newTitles = [];
  if ((G._monthPlatformOrders || 0) > 150 && !(G.unlockedTitles || []).includes('有单就是干')) newTitles.push('有单就是干');
  if ((G._monthOfflineOrders || 0) > 100 && !(G.unlockedTitles || []).includes('传奇报单王')) newTitles.push('传奇报单王');
  if ((G._monthDamageCost || 0) > 10000 && !(G.unlockedTitles || []).includes('F1预备役')) newTitles.push('F1预备役');
  if ((G._monthBossIncome || 0) > 10000 && !(G.unlockedTitles || []).includes('超绝包工头')) newTitles.push('超绝包工头');
  if ((G._monthLuxuryOrders || 0) > 80 && !(G.unlockedTitles || []).includes('这把高端局')) newTitles.push('这把高端局');
  if ((G._monthPenaltyCount || 0) > 0 && !(G.unlockedTitles || []).includes('常在河边走 哪有不湿鞋')) newTitles.push('常在河边走 哪有不湿鞋');
  if (newTitles.length > 0) { if (!G.unlockedTitles) G.unlockedTitles = []; G.unlockedTitles = G.unlockedTitles.concat(newTitles); }

  // 按分类汇总收支明细
  let currentMonth = getGameMonthIndex();
  let expenses = (G.expenseDetails || []).filter(r => r.monthIndex === currentMonth);
  let incomes = (G.incomeDetails || []).filter(r => r.monthIndex === currentMonth);

  let expGroups = {};
  expenses.forEach(r => { expGroups[r.category] = (expGroups[r.category] || 0) + r.amount; });
  let incGroups = {};
  incomes.forEach(r => { incGroups[r.category] = (incGroups[r.category] || 0) + r.amount; });

  let totalExp = expenses.reduce((s, r) => s + r.amount, 0);
  let totalInc = incomes.reduce((s, r) => s + r.amount, 0);
  let net = totalInc - totalExp;

  function buildCategoryHTML(groups, color) {
    let h = '';
    for (let cat in groups) {
      h += '<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;"><span>' + cat + '</span><span style="color:' + color + ';">' + (color === 'var(--success)' ? '+' : '-') + groups[cat] + '</span></div>';
    }
    return h;
  }

  let html = '<div style="text-align:center;margin-bottom:14px;">';
  html += '<h4 style="margin:0;">📊 ' + prevYear + '年' + prevMonth + '月 收支流水</h4></div>';

  // 收入
  html += '<p style="color:var(--success);font-weight:bold;margin-bottom:4px;">收入（+' + totalInc + '元）</p>';
  html += '<div style="background:#1e1e1e;border-radius:4px;padding:8px 10px;margin-bottom:10px;">';
  html += buildCategoryHTML(incGroups, 'var(--success)');
  if (Object.keys(incGroups).length === 0) html += '<p style="font-size:12px;color:var(--text-secondary);">暂无</p>';
  html += '</div>';

  // 支出
  html += '<p style="color:var(--danger);font-weight:bold;margin-bottom:4px;">支出（-' + totalExp + '元）</p>';
  html += '<div style="background:#1e1e1e;border-radius:4px;padding:8px 10px;margin-bottom:10px;">';
  html += buildCategoryHTML(expGroups, 'var(--danger)');
  if (Object.keys(expGroups).length === 0) html += '<p style="font-size:12px;color:var(--text-secondary);">暂无</p>';
  html += '</div>';

  // 净收入
  html += '<div style="display:flex;justify-content:space-between;font-weight:bold;padding:8px 0;border-top:1px solid #333;">';

function saveGame() {
  if (!G) return;
  try {
    localStorage.setItem('daijia_save', JSON.stringify(G));
  } catch(e) {}
}

function loadGame() {
  try {
    let data = localStorage.getItem('daijia_save');
    if (data) {
      G = JSON.parse(data);
      return true;
    }
  } catch(e) {}
  return false;
}

function deleteSave() {
  localStorage.removeItem('daijia_save');
}

function endGame(isFailure) {
  G.gameOver = true;
  if (gameTimer) { clearInterval(gameTimer); gameTimer = null; }
  stopAllDispatchTimers();

  document.getElementById('main-menu').style.display = 'none';
  document.getElementById('char-create').style.display = 'none';
  document.getElementById('ending-screen').style.display = 'flex';

  let el = document.getElementById('ending-screen');
  let years = getElapsedYears().toFixed(1);

  let title, titleClass;
  if (isFailure) {
    if (G.player.money <= 0) {
      title = '破产结局';
      titleClass = 'ending-bad';
    } else {
      title = '代驾分清零';
      titleClass = 'ending-bad';
    }
  } else {
    if (G.player.money > 100000) {
      title = '代驾之王';
      titleClass = 'ending-good';
    } else if (G.player.money > 50000) {
      title = '金牌司机';
      titleClass = 'ending-good';
    } else if (G.player.money > 20000) {
      title = '普通司机';
      titleClass = 'ending-neutral';
    } else {
      title = '勉强糊口';
      titleClass = 'ending-neutral';
    }
  }

  let profit = G.totalIncome - G.totalExpense;

  // 称号展示
  let titlesHTML = '';
  if (G.unlockedTitles && G.unlockedTitles.length > 0) {
    titlesHTML = '<div style="margin-top:12px;padding:10px;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.3);border-radius:8px;text-align:center;">' +
