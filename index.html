      '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;">';
    G.unlockedTitles.forEach(function(t) {
      titlesHTML += '<span style="font-size:12px;padding:3px 10px;border-radius:12px;background:rgba(212,175,55,0.15);color:var(--gold);border:1px solid rgba(212,175,55,0.3);">「' + t + '」</span>';

  el.innerHTML = '<h1 class="' + titleClass + '">' + title + '</h1>' +
    '<p style="color:var(--text-secondary);">游戏时长：' + years + '年</p>' +
    '<div class="ending-stats">' +

    '<div class="stat-row"><span>最终金钱</span><span style="color:var(--gold);">' + G.player.money + '元</span></div>' +
    '<div class="stat-row"><span>总收入</span><span style="color:var(--success);">' + G.totalIncome + '元</span></div>' +

function gameLoop() {
  if (!G || G.gameOver) return;

  // 弹窗打开时暂停游戏时间推进
  let mc = document.getElementById('modal-container');
  if (mc && mc.innerHTML.trim()) return;

  // 每次循环推进6分钟游戏时间
  advanceTime(6);

  // 更新在线时长（按自然日计算）
  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    if (p.joined && p.listening && !G.currentOrder) {
      p.onlineMinutesToday += 6;
    }
  }

  // 14H强制下线检查（按平台分别计算）
  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    if (p.joined && p.listening && p.onlineMinutesToday >= 14 * 60) {
      p.listening = false;
      p._listenStartGameMinutes = null;
      stopDispatchTimer(pk);
      addLog('⛔ ' + pk + '今日在线已达14小时，自动下线', 'bad');
      showModal('自动下线', '<p>' + pk + '今日听单时长已达14小时，已自动下线。</p><p style="font-size:12px;color:var(--text-secondary);">明日可继续接单</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]);
    }
  }

  // 派单由真实秒数定时器驱动，不在gameLoop中处理

  // 更新UI
  updateStatusBar();
  renderScoreDisplay();
}

function loadAndShow() {
  if (loadGame()) {
    showMainUI();

    for (let pk of ['DD','GD','E']) {
      if (G.platforms[pk].joined && G.platforms[pk].listening) {
        startDispatchTimer(pk);

    }
  }
}

  gameTimer = setInterval(gameLoop, 1000);

function showFastForwardConfirm() {
  // 平台单=7*(1-3随机数)*平台数量，报单=7*(1-2随机数)
  let joinedCount = Object.keys(G.platforms).filter(k => G.platforms[k].joined && G.platforms[k].kickedOutMonth < 0).length;
  let avgPlatform = randInt(1, 3) * Math.max(1, joinedCount);

  let html = '<p>快速推进7天：</p>' +
    '<p style="font-size:13px;color:var(--text-secondary);">• 自动完成 ' + (avgPlatform * 7) + ' 笔平台派单</p>' +
    '<p style="font-size:13px;color:var(--text-secondary);">• 自动完成 ' + (avgOffline * 7) + ' 笔线下报单</p>' +

    '<p style="font-size:13px;color:var(--text-secondary);">• 每日扣除餐饮费100元</p>';

  showModal('快速推进7日', html, [
    {text:'确认推进', cls:'btn-warning', action: function(){
      closeModal();

    }},
    {text:'取消', cls:'btn-secondary', action: closeModal}
  ]);
}

function doFastForward7Days(avgPlatform, avgOffline) {
  let totalPlatformOrders = avgPlatform * 7;
  let totalOfflineOrders = avgOffline * 7;
  let totalIncome = 0;
  let totalExpense = 0;

  for (let day = 0; day < 7; day++) {
    advanceTime(24 * 60);
    // 每日餐饮
    G.player.money -= 100; G.totalExpense += 100;
    addExpenseRecord('餐饮', 100);

    for (let i = 0; i < avgPlatform; i++) {
      let dist = randInt(5, 30);
      let fee = Math.floor(dist * 3 + randInt(10, 30));
      G.player.money += fee; G.totalIncome += fee; G.totalOrders++;
      totalIncome += fee;
      addIncomeRecord('平台订单', fee);

      // 50%概率触发车损（平台单）
      if (Math.random() < 0.5) {
        let dmgInfo = calcVehicleDamage(false, G.player.drive);
        if (dmgInfo && chance(dmgInfo.chance)) {
          let damage = randInt(dmgInfo.minDmg, dmgInfo.maxDmg);
          let userDamage = Math.min(Math.ceil(damage * 0.2), 1500);
          G.player.money -= userDamage; G.totalExpense += userDamage;
          totalExpense += userDamage;
          addExpenseRecord('车损赔偿', userDamage);
          // 随机选一个已加入平台扣分
          let joinedPks = Object.keys(G.platforms).filter(k => G.platforms[k].joined && G.platforms[k].kickedOutMonth < 0);
          if (joinedPks.length > 0) {
            let pk = joinedPks[randInt(0, joinedPks.length - 1)];
            let pp = G.platforms[pk];
            pp.daijiaScore = Math.max(0, pp.daijiaScore - 6);
            pp.serviceScore = Math.max(0, pp.serviceScore - 10);
            if (pp.daijiaScore <= 0) {
              // 快速推进中代驾分清0，花1000恢复3分
              if (G.player.money >= 1000) {
                G.player.money -= 1000; G.totalExpense += 1000; totalExpense += 1000;
                pp.daijiaScore = 3;
                pp.daijiaResetCount++;
              } else {
                // 余额不足，被清退
                pp.listening = false;
                pp.kickedOutMonth = getGameMonthIndex();
              }
            }
          }
        }
      }
    }

    for (let i = 0; i < avgOffline; i++) {
      let dist = randInt(3, 15);
      let fee = Math.floor(dist * 2.5 + randInt(5, 20));
      G.player.money += fee; G.totalIncome += fee; G.totalOrders++;
      totalIncome += fee;
      addIncomeRecord('线下报单', fee);

      // 50%概率触发车损（报单，用户全额）
      if (Math.random() < 0.5) {
        let dmgInfo = calcVehicleDamage(false, G.player.drive);
        if (dmgInfo && chance(dmgInfo.chance)) {
          let damage = randInt(dmgInfo.minDmg, dmgInfo.maxDmg);
          G.player.money -= damage; G.totalExpense += damage;
          totalExpense += damage;
          addExpenseRecord('车损赔偿', damage);
        }
      }
    }
  }

  addLog('⏩ 快速推进7天！完成' + totalPlatformOrders + '笔平台单+' + totalOfflineOrders + '笔报单，收入+' + totalIncome + '元' + (totalExpense > 0 ? '，车损-' + totalExpense + '元' : ''), 'info');
  updateStatusBar(); renderMainMenu(); saveGame();
}

function addExpenseRecord(category, amount) {
  if (!G.expenseDetails) G.expenseDetails = [];
  G.expenseDetails.push({ category: category, amount: amount, date: formatDate(getGameDate()), monthIndex: getGameMonthIndex() });
}

function addIncomeRecord(category, amount) {
  if (!G.incomeDetails) G.incomeDetails = [];
  G.incomeDetails.push({ category: category, amount: amount, date: formatDate(getGameDate()), monthIndex: getGameMonthIndex() });
}

function showIncomeExpenseDetail() {
  let d = getGameDate();
  let currentMonth = getGameMonthIndex();

  let expenses = (G.expenseDetails || []).filter(r => r.monthIndex === currentMonth);
  let incomes = (G.incomeDetails || []).filter(r => r.monthIndex === currentMonth);

  let expGroups = {};
  expenses.forEach(r => { expGroups[r.category] = (expGroups[r.category] || 0) + r.amount; });
  let incGroups = {};
  incomes.forEach(r => { incGroups[r.category] = (incGroups[r.category] || 0) + r.amount; });

  let totalExp = expenses.reduce((s, r) => s + r.amount, 0);
  let totalInc = incomes.reduce((s, r) => s + r.amount, 0);

  function buildCatHTML(groups, color) {
    let h = '';
    for (let cat in groups) {
      h += '<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;"><span>' + cat + '</span><span style="color:' + color + ';">' + (color === 'var(--success)' ? '+' : '-') + groups[cat] + '</span></div>';
    }
    return h;
  }

  let html = '<h4 style="margin-bottom:10px;">📊 ' + d.year + '年' + d.month + '月 收支明细</h4>';

  html += '<p style="color:var(--success);font-weight:bold;margin-bottom:4px;">收入（+' + totalInc + '元）</p>';
  html += '<div style="background:#1e1e1e;border-radius:4px;padding:8px 10px;margin-bottom:10px;">';
  if (Object.keys(incGroups).length === 0) { html += '<p style="font-size:12px;color:var(--text-secondary);">暂无</p>'; }
  else { html += buildCatHTML(incGroups, 'var(--success)'); }
  html += '</div>';

  html += '<p style="color:var(--danger);font-weight:bold;margin-bottom:4px;">支出（-' + totalExp + '元）</p>';
  html += '<div style="background:#1e1e1e;border-radius:4px;padding:8px 10px;margin-bottom:10px;">';
  if (Object.keys(expGroups).length === 0) { html += '<p style="font-size:12px;color:var(--text-secondary);">暂无</p>'; }
  else { html += buildCatHTML(expGroups, 'var(--danger)'); }
  html += '</div>';

  let net = totalInc - totalExp;
  html += '<div style="display:flex;justify-content:space-between;font-weight:bold;padding:8px 0;border-top:1px solid #333;">';
  html += '<span>净收入</span><span style="color:' + (net >= 0 ? 'var(--success)' : 'var(--danger)') + ';">' + (net >= 0 ? '+' : '') + net + '元</span></div>';

  showModal('收支明细', html, [{text:'关闭', cls:'btn-secondary', action:closeModal}]);
}

      } else {
        addLog('🚗 带' + d.name + '做单，话术不足（' + G.player.talk + '），无事发生', 'info');
      }
      closeModal(); saveGame();
    }},
    {text:'取消', cls:'btn-secondary', action: closeModal}
  ]);
}

function expandDriverSlots() {
  if (G.player.money < 10000) { showModal('余额不足', '<p>需要10000元</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]); return; }
  G.player.money -= 10000; G.totalExpense += 10000;
  G.bossDeposit += 10000;
  G.bossDriverSlots++;
  addLog('💼 追缴保证金10000元，司机名额+1（当前' + G.bossDriverSlots + '）', 'info');
  updateStatusBar(); showBossManage(); saveGame();
}
</script>
