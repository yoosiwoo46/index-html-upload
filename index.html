<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代驾司机模拟器 V1.3</title>
<style>
/* ========== Dark Luxury Gold ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #1a1a1a;
  --bg-secondary: #222222;
  --bg-card: #252525;
  --bg-card-hover: #2e2e2e;
  --text-primary: #e0e0e0;
  --text-secondary: #888888;
  --text-highlight: #d4af37;
  --accent: #d4af37;
  --accent-hover: #e6c44a;
  --success: #d4af37;
  --warning: #d4af37;
  --danger: #cc3333;
  --gold: #d4af37;
  --border: #333333;
  --modal-bg: rgba(0,0,0,0.92);
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
}
body {
  font-family: -apple-system, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #1a1a1a;
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.3) 100%);
  pointer-events: none;
  z-index: 0;
}
body > * { position: relative; z-index: 1; }
button {
  font-family: -apple-system, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  cursor: pointer;
  border: none;
  outline: none;
  transition: all 0.2s;
}
button:hover { transform: translateY(-1px); filter: brightness(1.1); }
button:active { transform: translateY(0); }
input, select {
  font-family: -apple-system, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #2a2a2a;
  color: #e0e0e0;
  border: 1px solid #444;
  padding: 8px 12px;
  border-radius: 4px;
  font-size: 14px;
}
input:focus, select:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 6px rgba(212,175,55,0.3); }

/* ========== 金色微光动画 ========== */
@keyframes goldShimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* ========== 状态栏 ========== */
#status-bar {
  display: none;
}
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-label { color: #888; }
.stat-value { color: var(--gold); font-weight: bold; }
.stat-value.money { color: #ffd700; }
.stat-value.danger { color: #cc3333; }

/* ========== 主容器 ========== */
#game-container {
  position: relative;
  z-index: 1;
  max-width: 800px; margin: 0 auto;
  padding: 20px 12px 20px;
  min-height: 100vh;
}

/* ========== 角色创建 ========== */
#char-create {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 90vh; gap: 16px;
}
#char-create h1 {
  font-size: 28px;
  background: linear-gradient(90deg, #d4af37, #f5e6a3, #d4af37, #b8941e);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: goldShimmer 4s linear infinite;
  margin-bottom: 10px;
  letter-spacing: 2px;
}
#char-create .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; }
.create-form {
  background: #252525; border-radius: 4px;
  padding: 24px; width: 100%; max-width: 400px;
  border: 1px solid #333;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.form-group { margin-bottom: 14px; }
.form-group label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-size: 13px; }
.form-group input, .form-group select { width: 100%; }
.gender-select { display: flex; gap: 10px; }
.gender-btn {
  flex: 1; padding: 10px; border-radius: 4px;
  background: #333; color: #ccc;
  font-size: 14px; text-align: center;
}
.gender-btn.selected {
  background: linear-gradient(135deg, #d4af37, #b8941e);
  color: #000;
  box-shadow: 0 2px 8px rgba(212,175,55,0.3);
}

/* ========== 按钮（统一：金色/黑色/红色）========== */
.btn-primary {
  background: linear-gradient(135deg, #d4af37, #b8941e);
  color: #000; padding: 12px 24px; border-radius: 4px;
  font-size: 15px; font-weight: bold; width: 100%;
  box-shadow: 0 2px 8px rgba(212,175,55,0.3);
}
.btn-primary:hover { box-shadow: 0 4px 16px rgba(212,175,55,0.5); }
.btn-secondary {
  background: #333; color: #ccc;
  padding: 10px 20px; border-radius: 4px; font-size: 14px;
}
.btn-secondary:hover { background: #444; }
.btn-success {
  background: linear-gradient(135deg, #d4af37, #b8941e);
  color: #000; padding: 10px 20px; border-radius: 4px; font-size: 14px;
  box-shadow: 0 2px 8px rgba(212,175,55,0.3);
}
.btn-success:hover { box-shadow: 0 4px 12px rgba(212,175,55,0.5); }
.btn-warning {
  background: #222; color: #d4af37;
  padding: 10px 20px; border-radius: 4px; font-size: 14px;
  border: 1px solid #d4af37;
}
.btn-warning:hover { background: #333; }
.btn-danger {
  background: #cc3333; color: #fff;
  padding: 10px 20px; border-radius: 4px; font-size: 14px;
}
.btn-danger:hover { background: #dd4444; }
.btn-small { padding: 6px 14px; font-size: 12px; }
.btn-disabled { opacity: 0.4; pointer-events: none; }

/* ========== 主菜单 ========== */
#main-menu { padding-top: 10px; }
#main-menu h2 {
  color: var(--gold); margin-bottom: 16px; font-size: 20px;
  background: linear-gradient(90deg, #d4af37, #f5e6a3, #d4af37, #b8941e);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: goldShimmer 4s linear infinite;
}
.menu-grid { display: flex; flex-direction: column; gap: 10px; }
.info-section {
  background: #252525; border: 1px solid #333;
  border-radius: 6px; padding: 8px 12px; margin-bottom: 4px;
}
.info-section-title {
  font-size: 11px; color: var(--gold); font-weight: bold;
  margin-bottom: 6px; padding-bottom: 4px;
  border-bottom: 1px solid #333;
}
.info-section-body {
  display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 12px;
  color: var(--text-primary); line-height: 1.8;
}
.menu-section { margin-bottom: 4px; }
.menu-section-title {
  font-size: 11px; color: var(--text-secondary); font-weight: bold;
  margin-bottom: 6px; padding-left: 4px;
  text-transform: uppercase; letter-spacing: 1px;
}
.menu-item {
  background: #252525; border-radius: 4px; padding: 16px;
  display: flex; align-items: center; gap: 12px;
  border: 1px solid #333; cursor: pointer;
  transition: all 0.2s;
  border-left: 3px solid #d4af37;
  position: relative;
}
.menu-item:hover {
  background: #2e2e2e;
  border-left: 3px solid #d4af37;
}
.menu-icon { font-size: 28px; min-width: 40px; text-align: center; }
.menu-text h3 { font-size: 15px; margin-bottom: 4px; color: var(--text-primary); }
.menu-text p { font-size: 12px; color: var(--text-secondary); }
.menu-badge {
  margin-left: auto; background: linear-gradient(135deg, #d4af37, #b8941e);
  color: #000; padding: 2px 8px; border-radius: 10px; font-size: 11px;
  font-weight: bold;
}
.menu-tip {
  position: absolute; top: -8px; right: -8px;
  background: linear-gradient(135deg, #d4af37, #b8941e);
  color: #000; font-size: 10px; font-weight: bold;
  padding: 2px 6px; border-radius: 10px;
  animation: tipPulse 2s infinite;
  pointer-events: none; z-index: 5;
}
@keyframes tipPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.1); }
}

/* ========== 日志面板 ========== */
#log-panel {
  margin-top: 20px; background: #252525;
  border-radius: 4px; border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 0 10px rgba(212,175,55,0.03);
}
#log-panel .log-header {
  padding: 10px 14px; background: #1a1a1a;
  font-size: 13px; color: var(--gold);
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
}
#log-panel .log-header button { font-size: 12px; color: var(--text-secondary); background: none; border: none; }
#log-panel .log-header button:hover { color: var(--gold); }
#log-list {
  max-height: 200px; overflow-y: auto; padding: 8px 14px;
  font-size: 12px; line-height: 1.8;
  color: #a09080;
}
#log-list::-webkit-scrollbar { width: 6px; }
#log-list::-webkit-scrollbar-track { background: #252525; }
#log-list::-webkit-scrollbar-thumb { background: #3a3020; border-radius: 3px; }
#log-list::-webkit-scrollbar-thumb:hover { background: #d4af37; }
.log-entry { border-bottom: 1px solid rgba(42,32,21,0.5); padding: 2px 0; }
.log-time { color: var(--text-secondary); margin-right: 6px; }
.log-good { color: #c5a000; }
.log-bad { color: #cc3333; }
.log-warn { color: #d4af37; }
.log-info { color: #b8a080; }

/* ========== 模态框 ========== */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.95); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.modal {
  background: #252525; border-radius: 4px;
  border: 1px solid var(--border); max-width: 500px; width: 100%;
  max-height: 85vh; overflow-y: auto;
  box-shadow: 0 0 30px rgba(212,175,55,0.1), inset 0 0 30px rgba(212,175,55,0.02);
}
.modal::-webkit-scrollbar { width: 6px; }
.modal::-webkit-scrollbar-track { background: #252525; }
.modal::-webkit-scrollbar-thumb { background: #3a3020; border-radius: 3px; }
.modal::-webkit-scrollbar-thumb:hover { background: #d4af37; }
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.modal-header h3 {
  font-size: 16px; color: var(--gold);
  background: linear-gradient(90deg, #d4af37, #f5e6a3, #d4af37);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: goldShimmer 3s linear infinite;
}
.modal-close {
  background: none; color: var(--text-secondary); font-size: 22px;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: none;
}
.modal-close:hover { background: rgba(212,175,55,0.15); color: var(--gold); }
.modal-body { padding: 16px 20px; }
.modal-footer {
  padding: 12px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end;
}

/* ========== 平台面板 ========== */
.platform-card {
  background: #252525; border-radius: 4px; padding: 16px;
  margin-bottom: 12px; border: 1px solid var(--border);
  box-shadow: 0 0 10px rgba(212,175,55,0.03);
  border-left: 3px solid #d4af37;
}
.platform-card h4 { color: var(--gold); margin-bottom: 8px; font-size: 15px; }
.platform-info { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }
.platform-info span { color: var(--text-primary); }

/* ========== 地点列表 ========== */
.location-list { display: flex; flex-direction: column; gap: 8px; }
.location-item {
  background: #252525; border-radius: 4px; padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: center;
  border: 1px solid var(--border); cursor: pointer;
}
.location-item:hover { border-color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.1); }
.location-name { font-size: 14px; }
.location-dist { font-size: 12px; color: var(--text-secondary); }

/* ========== NPC列表 ========== */
.npc-item {
  background: #252525; border-radius: 4px; padding: 12px;
  margin-bottom: 8px; border: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.npc-desc { font-size: 14px; }

/* ========== 订单卡片 ========== */
.order-card {
  background: #252525; border-radius: 4px; padding: 14px;
  margin-bottom: 10px; border: 1px solid var(--border);
  box-shadow: 0 0 10px rgba(212,175,55,0.03);
}
.order-card.premium { border-color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.1); }
.order-info { font-size: 13px; line-height: 1.8; }
.order-info .label { color: var(--text-secondary); }
.order-info .value { color: var(--text-primary); }
.order-info .income { color: var(--gold); font-weight: bold; }
.order-actions { margin-top: 10px; display: flex; gap: 8px; }

/* ========== 热力图 ========== */
.heatmap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
.heatmap-item {
  background: #252525; border-radius: 4px; padding: 12px;
  text-align: center; border: 1px solid var(--border);
}
.heatmap-item:hover { border-color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.1); }
.heatmap-item .heat-level { font-size: 24px; margin: 4px 0; }
.heatmap-item .heat-name { font-size: 13px; }
.heatmap-item .heat-count { font-size: 11px; color: var(--text-secondary); }

/* ========== 商店 ========== */
.shop-item {
  background: #252525; border-radius: 4px; padding: 14px;
  margin-bottom: 10px; border: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  box-shadow: 0 0 10px rgba(212,175,55,0.03);
}
.shop-info h4 { font-size: 14px; margin-bottom: 4px; }
.shop-info p { font-size: 12px; color: var(--text-secondary); }
.shop-price { color: var(--gold); font-weight: bold; font-size: 15px; white-space: nowrap; }

/* ========== 培训 ========== */
.quiz-question { font-size: 14px; margin-bottom: 12px; line-height: 1.6; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-option {
  background: #252525; border: 1px solid var(--border);
  border-radius: 4px; padding: 10px 14px; font-size: 13px;
  text-align: left; color: var(--text-primary);
}
.quiz-option:hover { border-color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.1); }
.quiz-option.correct { border-color: var(--success); background: rgba(197,160,0,0.1); }
.quiz-option.wrong { border-color: var(--danger); background: rgba(139,0,0,0.15); }

/* ========== 结算界面 ========== */
#ending-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 90vh; text-align: center; gap: 16px;
}
#ending-screen h1 {
  font-size: 32px;
  background: linear-gradient(90deg, #d4af37, #f5e6a3, #d4af37, #b8941e);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: goldShimmer 4s linear infinite;
}
#ending-screen .ending-good { color: #c5a000; }
#ending-screen .ending-bad { color: #cc3333; }
#ending-screen .ending-neutral { color: #d4af37; }
.ending-stats {
  background: #252525; border-radius: 4px; padding: 20px;
  width: 100%; max-width: 400px; text-align: left;
  border: 1px solid var(--border);
  box-shadow: 0 0 15px rgba(212,175,55,0.05), inset 0 0 30px rgba(212,175,55,0.02);
}
.ending-stats .stat-row {
  display: flex; justify-content: space-between; padding: 6px 0;
  font-size: 14px; border-bottom: 1px solid rgba(42,32,21,0.5);
}

/* ========== 听单状态 ========== */
.listening-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 12px; font-size: 12px;
}
.listening-badge.on { background: rgba(197,160,0,0.15); color: #c5a000; }
.listening-badge.off { background: rgba(42,32,21,0.3); color: var(--text-secondary); }
.listening-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #c5a000;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ========== 进度条 ========== */
.progress-bar {
  width: 100%; height: 6px; background: #252525;
  border-radius: 3px; overflow: hidden; margin: 6px 0;
  border: 1px solid var(--border);
}
.progress-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.3s;
  background: linear-gradient(90deg, #d4af37, #b8941e);
}

/* ========== 分数显示 ========== */
.score-display {
  display: flex; gap: 16px; flex-wrap: wrap; margin: 10px 0;
}
.score-box {
  background: #252525; border-radius: 4px; padding: 10px 16px;
  text-align: center; flex: 1; min-width: 100px;
  border: 1px solid var(--border);
  box-shadow: 0 0 10px rgba(212,175,55,0.03), inset 0 0 20px rgba(212,175,55,0.02);
}
.score-box .score-label { font-size: 11px; color: var(--text-secondary); }
.score-box .score-val { font-size: 20px; font-weight: bold; margin-top: 4px; color: var(--gold); }

/* ========== 响应式 ========== */
@media (max-width: 600px) {
  #status-bar { font-size: 11px; padding: 6px 8px; gap: 4px 10px; }
  #game-container { padding: 52px 8px 16px; }
  .modal { max-height: 90vh; }
  .modal-body { padding: 12px 14px; }
  .heatmap-grid { grid-template-columns: repeat(2, 1fr); }
  .menu-icon { font-size: 24px; min-width: 32px; }
  .menu-text h3 { font-size: 14px; }
  .create-form { padding: 16px; }
  #char-create h1 { font-size: 22px; }
}
@media (min-width: 601px) and (max-width: 900px) {
  #game-container { max-width: 600px; }
}
@media (min-width: 901px) {
  #game-container { max-width: 500px; }
}

/* ========== 理财系统 ========== */
.finance-card {
  background: #252525; border-radius: 4px; padding: 14px;
  margin-bottom: 10px; border: 1px solid var(--border);
  box-shadow: 0 0 10px rgba(212,175,55,0.03);
  border-left: 3px solid #d4af37;
}
.finance-card h4 { color: var(--gold); margin-bottom: 8px; font-size: 15px; }
.finance-info { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }
.finance-info span { color: var(--text-primary); }
.finance-item {
  background: #252525; border-radius: 4px; padding: 12px;
  margin-bottom: 8px; border: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.finance-status { font-size: 12px; padding: 2px 8px; border-radius: 10px; }
.finance-status.active { background: rgba(197,160,0,0.15); color: #c5a000; }
.finance-status.locked { background: rgba(212,175,55,0.1); color: #d4af37; }

/* ========== 全局滚动条 ========== */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #252525; }
::-webkit-scrollbar-thumb { background: #2a2015; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #d4af37; }

/* ========== 装饰性金色分割线 ========== */
hr {
  border: none;
  height: 1px;
  background: linear-gradient(90deg, transparent, #d4af37, transparent);
  opacity: 0.4;
}

</style>
</head>
<body>

<!-- 状态栏 -->
<div id="status-bar">
  <div class="stat-item"><span class="stat-value" id="sb-location" style="color:var(--gold);">-</span></div>
  <div class="stat-item"><span class="stat-label">驾驶:</span><span class="stat-value" id="sb-drive">-</span></div>
  <div class="stat-item"><span class="stat-label">话术:</span><span class="stat-value" id="sb-talk">-</span></div>
  <div class="stat-item"><span class="stat-label">豪车:</span><span class="stat-value" id="sb-luxury">-</span></div>
  <div class="stat-item"><span class="stat-label">代驾分:</span><span class="stat-value" id="sb-daijia">-</span></div>
  <div class="stat-item"><span class="stat-label">服务分:</span><span class="stat-value" id="sb-service">-</span></div>
  <div class="stat-item"><span class="stat-label">日期:</span><span class="stat-value" id="sb-date">-</span></div>
  <div class="stat-item"><span class="stat-label">时间:</span><span class="stat-value" id="sb-time">-</span></div>
  <div class="stat-item"><span class="stat-label">📍</span><span class="stat-value" id="sb-location" style="color:var(--success);">-</span></div>
  <div class="stat-item" id="sb-loan-info" style="display:none;"><span class="stat-label">贷款:</span><span class="stat-value danger" id="sb-loan">-</span></div>
  <div class="stat-item"><span class="stat-label">征信:</span><span class="stat-value" id="sb-credit">-</span></div>
</div>

<!-- 游戏容器 -->
<div id="version-btn" style="position:fixed;top:8px;right:12px;z-index:150;cursor:pointer;font-size:12px;color:var(--text-secondary);background:var(--bg-card);padding:2px 10px;border-radius:10px;border:1px solid var(--border);" onclick="showVersionInfo()">V1.3</div>

<div id="game-container">
  <!-- 角色创建 -->
  <div id="char-create">
    <h1>🚗 代驾司机模拟器</h1>
    <p class="subtitle">急头白脸就是干</p>
    <div class="create-form">
      <div class="form-group">
        <label>姓名</label>

// ================================================================
// ===================== 时间系统 ==================================
// ================================================================

function getGameDate() {
  let totalDays = Math.floor(G.time / (24 * 60));
  let year = G.startYear + Math.floor(totalDays / 365);
  let dayInYear = totalDays % 365;
  // 简化月份计算
  let monthDays = [31,28,31,30,31,30,31,31,30,31,30,31];
  let m = 0;
  while (m < 12 && dayInYear >= monthDays[m]) {
    dayInYear -= monthDays[m];
    m++;
  }
  return { year, month: m + 1, day: dayInYear + 1 };
}

function getGameTime() {
  let minutesInDay = G.time % (24 * 60);
  let h = Math.floor(minutesInDay / 60);
  let min = minutesInDay % 60;
  return { h, min };
}

function getGameMonthIndex() {
  let d = getGameDate();
  return (d.year - G.startYear) * 12 + (d.month - 1);
}

function getGameDayIndex() {
  return Math.floor(G.time / (24 * 60));
}

// 获取某月的天数
function getDaysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

// 判断是否是某月最后一天
function isLastDayOfMonth() {
  let d = getGameDate();
  return d.day >= getDaysInMonth(d.year, d.month);
}

function getGameWeekIndex() {
  return Math.floor(G.time / (7 * 24 * 60));
}

function getElapsedYears() {
  return G.time / (365 * 24 * 60);
}

function isHoliday() {
  let d = getGameDate();
  return HOLIDAYS.some(h => h.m === d.month && h.d === d.day);
}

function isWinterDiscount() {
  let m = getGameDate().month;
  return m >= 11 || m <= 2;
}

function isRainyDay() {
  // 简单随机：每天15%概率下雨
  let dayHash = getGameDayIndex() * 7 + 13;
  return (dayHash % 100) < 15;
}

function formatTime(h, min) {
  return String(h).padStart(2,'0') + ':' + String(min).padStart(2,'0');
}

function formatDate(d) {
  return d.year + '年' + d.month + '月' + d.day + '日';
}

function advanceTime(minutes) {
  let oldDay = getGameDayIndex();
  let oldYear = getGameDate().year;
  G.time += minutes;
  let newDay = getGameDayIndex();
  let newDate = getGameDate();
  let newYear = newDate.year;

  // 自然日切换时重置在线时长
  if (newDay !== oldDay) {
    G._todaySleepMinutes = 0;
    for (let pk of ['DD','GD','E']) {
      G.platforms[pk].onlineMinutesToday = 0;
      if (G.platforms[pk].listening) {
        G.platforms[pk].listening = false;
        G.platforms[pk]._listenStartGameMinutes = null;
        stopDispatchTimer(pk);
      }
    }
    G._bankOrdersToday = 0;
    // 每日天气（季节感知）
    let m = newDate.month;
    let weathers;
    if (m >= 4 && m <= 10) {
      // 4-10月：无雪天
      weathers = ['晴天', '晴天', '晴天', '多云', '多云', '下雨', '下雨', '下雨'];
    } else {
      // 1-3月、11-12月：有雨有雪
      weathers = ['晴天', '晴天', '多云', '多云', '下雨', '下雨', '下雪', '下雪'];
    }
    G.weather = weathers[randInt(0, weathers.length - 1)];
    let weatherIcon = G.weather === '晴天' ? '☀️' : G.weather === '多云' ? '⛅' : G.weather === '下雨' ? '🌧️' : '❄️';
    addLog(weatherIcon + ' 今日天气：' + G.weather, 'info');
    
    // 理财每日处理
    processFinanceDaily();
    
    // 自动扣除吃饭费用
    G.player.money -= 100;
    G.totalExpense += 100;
    addExpenseRecord('餐饮', 100);
    addLog('🍜 每日餐饮 -100元', 'info');
    
    // 受伤恢复检查
    if (G.injured && getGameDayIndex() >= G.injuredUntilDay) {
      G.injured = false;
      G.injuredUntilDay = -1;
      addLog('💪 伤势恢复，可以继续接单了！', 'good');
    }
    // 雨天客服外呼
    if (isRainyDay() && Math.random() < 0.3) {
      let joinedPks = ['DD','GD','E'].filter(k => G.platforms[k].joined && G.platforms[k].kickedOutMonth < 0 && !G.platforms[k].listening);
      if (joinedPks.length > 0) {
        let pk = joinedPks[randInt(0, joinedPks.length - 1)];
        addLog('📞 ' + pk + '客服来电：雨天补贴，快来上线做单！', 'info');
        showModal('客服外呼', '<p>📞 ' + pk + '平台客服来电：</p><p>"师傅您好，今天下雨平台给您雨天补贴，快来上线做单吧！"</p>', [{text:'立即上线', cls:'btn-primary', action: function(){ closeModal(); toggleListening(pk); }},
          {text:'知道了', cls:'btn-secondary', action: closeModal}]);
      }
    }
    // 8天未听单客服外呼（赠送权益）
    for (let pk of ['DD','GD','E']) {
      let p = G.platforms[pk];
      if (!p.joined || p.kickedOutMonth >= 0 || p.listening) continue;
      let lastDay = p._lastListenDay || 0;
      let daysSince = getGameDayIndex() - lastDay;
      if (daysSince >= 8 && Math.random() < 0.5) {
        let rightOptions = [
          {id:'bao_shang_bao', name:'保上保', days:15},
          {id:'youzhi_order', name:'优质订单优先享', days:7},
          {id:'mian_yong', name:'超值免佣包', days:8}
        ];
        let right = rightOptions[randInt(0, rightOptions.length - 1)];
        // 真实赠送权益
        if (right.id === 'bao_shang_bao') {
          G[pk + '_baoShangBao'] = getGameDayIndex() + right.days;
          G[pk + '_baoShangBaoBuyDay'] = getGameDayIndex();
          G[pk + '_baoShangBaoPrice'] = 8000;
          G[pk + '_baoShangBaoAccidents'] = 0;
        } else if (right.id === 'youzhi_order') {
          G[pk + '_youzhiOrder'] = {count: 10, expireDay: getGameDayIndex() + right.days};
        } else if (right.id === 'mian_yong') {
          G[pk + '_mianYong'] = getGameDayIndex() + right.days;
        }
        addLog('📞 ' + pk + '客服来电：赠送' + right.name + '（' + right.days + '天）！', 'good');
        showModal('客服外呼', '<p>📞 ' + pk + '平台客服来电：</p><p>"师傅您好，平台为您赠送了' + right.name + '（' + right.days + '天），快来做单吧！"</p><p style="color:var(--success);">已自动生效！</p>', [{text:'立即上线', cls:'btn-primary', action: function(){ closeModal(); toggleListening(pk); }},
          {text:'知道了', cls:'btn-secondary', action: closeModal}]);
        break;
      }
    }
    // 每月最后一天支付房租（有房贷且未还清时不交房租）
    if (isLastDayOfMonth() && (!G.family.hasMortgage || G.family.mortgageMonthsLeft <= 0)) {
      G.player.money -= 3000;
      G.totalExpense += 3000;
      addExpenseRecord('房租', 3000);
      addLog('🏠 支付房租水电 -3000元', 'bad');
      updateStatusBar();
    }
    // 每月2号支付房贷
    if (newDate.day === 2 && G.family.hasMortgage && G.family.mortgageMonthsLeft > 0) {
      if (G.player.money >= G.family.mortgageMonthly) {
        G.player.money -= G.family.mortgageMonthly;
        G.totalExpense += G.family.mortgageMonthly;
        addExpenseRecord('房贷', G.family.mortgageMonthly);
        G.family.mortgageMonthsLeft--;
        addLog('🏠 还房贷 -' + G.family.mortgageMonthly + '元（剩余' + Math.ceil(G.family.mortgageMonthsLeft / 12) + '年）', 'bad');
        if (G.family.mortgageMonthsLeft <= 0) {
          G.family.hasMortgage = false;
          addLog('🎉 房贷还清！以后无需支付房租和房贷', 'good');
        }
      } else {
        // 还不上房贷，消耗征信
        G.credit--;
        addLog('⚠️ 房贷逾期！征信-1（剩余' + G.credit + '）', 'bad');
        if (G.credit <= 0) {
          endGame(true); // 失信人
          return;
        }
      }
    }
    // 每月1日展示上月收支流水
    if (newDate.day === 1 && oldDay !== undefined) {
      showMonthlyReport();
    }
  }

  // 年份变化时年龄+1、驾龄+1
  if (newYear > oldYear) {
    G.player.age++;
    G.player.exp++;
    addLog('🎂 新的一年！年龄' + G.player.age + '岁，驾龄' + G.player.exp + '年', 'info');
    // 80岁退休
    if (G.player.age >= 80) {
      addLog('🎉 您已年满80岁，光荣退休！', 'info');
      endGame(false); // 正常结局
      return;
    }

    // 子女年龄增长
    G.family.children.forEach(child => { child.age++; });

    // 检查年龄限制
    if (G.player.age > 50) {
      for (let pk of ['DD','GD']) {
        if (G.platforms[pk].joined && G.platforms[pk].kickedOutMonth < 0) {
          G.platforms[pk].listening = false;
          G.platforms[pk].kickedOutMonth = getGameMonthIndex();
          stopDispatchTimer(pk);
          addLog('🚫 因年龄超过50岁，' + pk + '平台已清退', 'bad');
          showModal('平台清退', '<p style="color:var(--danger);">您已年满50岁，' + pk + '平台按规定清退。</p>', [{text:'确定', cls:'btn-primary', action:closeModal}]);
        }
      }
    }
  }

  // 检查游戏结束
  if (getElapsedYears() >= 3) {
    endGame(false);
    return;
  }

  // 月度处理
  processMonthly();

  // 征信检查
  if (G.credit <= 0 && G.player.money <= 0) {
    endGame(true); // 失信人结局
    return;
  }
  // 周度培训检查
  processWeekly();
  // 多平台检测
  checkMultiPlatform();

  // === 资金不足检查 ===
  if (G.player.money < 0) {
    checkMoneyNegative();
    return;
  }

  // 强制睡眠检查：每天最少5小时睡眠
  if (newDay === oldDay && !G.currentOrder) {
    let t = getGameTime();
    let todaySleep = G._todaySleepMinutes || 0;
    if (todaySleep < 5 * 60 && t.h >= 19) {
      let minutesInDay = G.time % (24 * 60);
      let minutesToMidnight = (24 * 60) - minutesInDay + 1;
      G._todaySleepMinutes = todaySleep + minutesToMidnight;
      G.time += minutesToMidnight;
      // 强制休息跨日，重置平台听单时长
      for (let pk of ['DD','GD','E']) {
        G.platforms[pk].onlineMinutesToday = 0;
        if (G.platforms[pk].listening) {
          G.platforms[pk].listening = false;
          G.platforms[pk]._listenStartGameMinutes = null;
          stopDispatchTimer(pk);
        }
      }
      addLog('😴 扛不住了，强制休息到次日', 'info');
      showModal('强制休息', '<p>😴 扛不住了，我得睡会儿</p><p style="font-size:13px;">今日睡眠不足5小时，已强制休息至次日</p>', [{text:'确定', cls:'btn-primary', action: function(){ closeModal(); updateStatusBar(); renderMainMenu(); saveGame(); }}]);
      return;
    }
  }
}

// ================================================================
// ===================== 新手引导系统 ==============================
// ================================================================

function showTutorial(id, title, content) {
  if (!G || !G._tutorial || G._tutorial.skipped) return;
  if (G._tutorial.seen[id]) return;
  G._tutorial.seen[id] = true;
  saveGame();
  let html = '<p style="font-size:14px;line-height:1.6;">' + content + '</p>';
  html += '<div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end;">';
  html += '<button class="btn-secondary btn-small" onclick="skipAllTutorial()">跳过新手期</button>';
  html += '<button class="btn-primary btn-small" onclick="closeModal()">确定</button>';
  html += '</div>';
  showModal(title, html, []);
}

function skipAllTutorial() {
  if (!G) return;
  G._tutorial.skipped = true;
  closeModal();
  addLog('📖 已跳过新手引导', 'info');
  saveGame();
}

// ================================================================
// ===================== 资金不足检查（通用）========================
// ================================================================

function checkMoneyNegative() {
  if (!G || G.player.money >= 0) return false;
  if (G.credit <= 0) {
    endGame(true); // 征信耗尽，失信人结局
    return true;
  }
  // 延迟一帧弹窗，避免在已有模态框的回调中嵌套弹窗
  setTimeout(function() {
    if (!G || G.gameOver) return;
    if (G.player.money >= 0) return; // 可能已被其他操作补回
    showModal('💰 资金不足',
      '<p style="color:var(--danger);font-size:16px;">您的余额为 ' + G.player.money + ' 元，已为负数！</p>' +
      '<p>是否申请贷款渡过难关？</p>' +
      '<p style="font-size:12px;color:var(--text-secondary);">当前征信：' + G.credit + '（每次贷款消耗1征信，贷款还清后征信恢复）</p>',
      [
        {text:'申请贷款', cls:'btn-warning', action: function(){ closeModal(); showLoanDialog(); }},
        {text:'不贷款，结束游戏', cls:'btn-danger', action: function(){ closeModal(); endGame(true); }}
      ]
    );
  }, 300);
  return true;
}

// ================================================================
// ===================== 月度/周度处理 =============================
// ================================================================

function processMonthly() {
  let mi = getGameMonthIndex();
  if (mi === G.lastMonthlyProcess) return;
  G.lastMonthlyProcess = mi;

  let d = getGameDate();
  addLog('📅 新月份开始：' + d.year + '年' + d.month + '月', 'info');

  // 房租已移至每月最后一天支付

  // 平台降价/补贴
  if (Math.random() < 0.2) {
    G.priceAdjust -= 1;
    addLog('📉 平台降价，单价-1', 'warn');
  }
  if (Math.random() < 0.1) {
    G.priceAdjust += 1;
    addLog('📈 平台补贴，单价+1', 'good');
  }

  // 每月报单任务
  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    if (!p.joined || p.kickedOutMonth >= 0) continue;
    p.monthlyTarget = randInt(1, 30);
    p.monthlyOrders = 0;
    addLog('📋 ' + pk + '平台本月报单任务：' + p.monthlyTarget + '单', 'info');
  }

  // 个税（考虑房租/房贷抵扣）
  if (G.monthlyIncome > 5000) {
    let deduction = 0;
    if (G.family.hasMortgage && G.family.mortgageMonthsLeft > 0) {
      deduction = G.family.mortgageMonthly;
    } else {
      deduction = 3000; // 房租
    }
    let taxableIncome = G.monthlyIncome - 5000 - deduction;
    if (taxableIncome < 0) taxableIncome = 0;
    let tax = Math.floor(taxableIncome * 0.1);
    G.player.money -= tax;
    G.taxPaid += tax;
    G.totalExpense += tax;
    addExpenseRecord('个税', tax);
    addLog('💰 缴纳个税 -' + tax + '元', 'bad');
  }
  G.monthlyIncome = 0;
  // 重置月度称号统计
  G._monthPlatformOrders = 0;
  G._monthOfflineOrders = 0;
  G._monthLuxuryOrders = 0;
  G._monthDamageCost = 0;
  G._monthBossIncome = 0;
  G._monthPenaltyCount = 0;

  // 检查月度任务完成
  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    if (!p.joined) continue;
      // (在下一个月份开始时检查上个月的)
  }
  // 上个月的任务检查在月初做
  // 我们需要在下个月初检查上月的完成情况
  // 由于这是月初触发的，我们检查的是"上个月"的数据
  // 但数据已被重置，所以我们需要在重置前检查
  // 修正：先检查再重置
}

// 重写月度处理，修正顺序
function processMonthly_v2() {
  let mi = getGameMonthIndex();
  if (mi === G.lastMonthlyProcess) return;

  // 睡眠健康检查
  checkSleepHealth();

  let d = getGameDate();

  // 先检查上月任务完成情况（如果不是第一个月）
  if (G.lastMonthlyProcess >= 0) {
    for (let pk of ['DD','GD','E']) {
      let p = G.platforms[pk];
      if (!p.joined || p.kickedOutMonth >= 0) continue;
      if (p.monthlyOrders >= p.monthlyTarget) {
        p.serviceScore = Math.min(100, p.serviceScore + 10);
        addLog('✅ ' + pk + '月度任务完成！服务分+10', 'good');
      } else {
        p.serviceScore = Math.max(0, p.serviceScore - 10);
        addLog('❌ ' + pk + '月度任务未完成！服务分-10', 'bad');
      }
    }
  }

  G.lastMonthlyProcess = mi;
  addLog('📅 新月份：' + d.year + '年' + d.month + '月', 'info');

  // 还贷款
  G.loans.forEach(loan => {
    if (loan.monthsLeft > 0) {
      G.player.money -= loan.monthlyPayment;
      G.totalExpense += loan.monthlyPayment;
      addExpenseRecord('贷款', loan.monthlyPayment);
      loan.remaining -= loan.monthlyPayment;
      loan.monthsLeft--;
      addLog('💳 还贷款 -' + loan.monthlyPayment + '元（剩余' + loan.monthsLeft + '期）', 'bad');
    }
  });
  // 贷款还清后征信恢复
  let beforeLen = G.loans.length;
  G.loans = G.loans.filter(l => l.monthsLeft > 0);
  let paidOff = beforeLen - G.loans.length;
  if (paidOff > 0) {
    G.credit += paidOff;
    addLog('✅ ' + paidOff + '笔贷款还清！征信恢复+' + paidOff + '（当前' + G.credit + '）', 'good');
  }

  // 存款利息（正数余额才有利息）
  if (G.player.money > 0) {
    let interest = Math.floor(G.player.money * G.savingsInterest / 100);
    if (interest > 0) {
      G.player.money += interest;
      G.totalIncome += interest;
      addIncomeRecord('存款利息', interest);
      addLog('🏦 存款利息 +' + interest + '元', 'good');
    }
  }

  // 代步车保养费（每月20元）
  if (G.hasBike) {
    G.player.money -= 20;
    G.totalExpense += 20;
    addLog('🔧 代步车保养 -20元', 'bad');
  }

  // 代步车分期还款
  if (G.bikeInstallment && G.bikeInstallment.monthsLeft > 0) {
    G.player.money -= G.bikeInstallment.monthlyPayment;
    G.totalExpense += G.bikeInstallment.monthlyPayment;
    G.bikeInstallment.monthsLeft--;
    addLog('🚲 代步车分期 -' + G.bikeInstallment.monthlyPayment + '元（剩余' + G.bikeInstallment.monthsLeft + '期）', 'bad');
    if (G.bikeInstallment.monthsLeft <= 0) G.bikeInstallment = null;
  }

  // 代步车折旧检查（2年=730天）
  if (G.hasBike && G.bikeBoughtDate > 0) {
    let bikeAge = G.time - G.bikeBoughtDate;
    if (bikeAge >= 2 * 365 * 24 * 60) { // 2年
      G.hasBike = false;
      G.bikeAvailable = false;
      G.bikeBoughtDate = -1;
      G.bikeInstallment = null;
      addLog('💔 代步车已损坏（使用超过2年）！', 'bad');
      showModal('代步车损坏', '<p style="color:var(--danger);">您的代步车已使用超过2年，损坏报废了。</p><p>需要重新购买。</p>', [{text:'确定', cls:'btn-primary', action:closeModal}]);
    }
  }

  // 房租已移至每月最后一天支付

  // 平台调价
  if (Math.random() < 0.2) { G.priceAdjust -= 1; addLog('📉 平台降价，单价-1', 'warn'); }
  if (Math.random() < 0.1) { G.priceAdjust += 1; addLog('📈 平台补贴，单价+1', 'good'); }

  // 个税（考虑房租/房贷抵扣）
  if (G.monthlyIncome > 5000) {
    let deduction = 0;
    if (G.family.hasMortgage && G.family.mortgageMonthsLeft > 0) {
      deduction = G.family.mortgageMonthly;
    } else {
      deduction = 3000; // 房租
    }
    let taxableIncome = G.monthlyIncome - 5000 - deduction;
    if (taxableIncome < 0) taxableIncome = 0;
    let tax = Math.floor(taxableIncome * 0.1);
    G.player.money -= tax; G.taxPaid += tax; G.totalExpense += tax;
    addExpenseRecord('个税', tax);
    addLog('💰 缴纳个税 -' + tax + '元', 'bad');
  }
  // 保存上月收支数据（在重置前）
  G.lastMonthIncome = G.monthlyIncome;
  G.lastMonthExpense = G.totalExpense; // 本月累计支出（含房租）
  G.lastMonthOrders = G.totalOrders;
  G.lastMonthTax = G.taxPaid;
  // 理财收益统计
  G.lastMonthFinanceIncome = G._currentMonthFinanceIncome || 0;
  G._currentMonthFinanceIncome = 0;
  G.monthlyIncome = 0;

  // 新月度任务
  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    if (!p.joined) continue;
    p.monthlyTarget = randInt(1, 30);
    p.monthlyOrders = 0;
    addLog('📋 ' + pk + '本月任务：完成' + p.monthlyTarget + '单', 'info');
  }

  // 检查是否需要线下培训
  let lastM = G.lastMonthlyProcess - 1;
  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    if (!p.joined) continue;
    if (p.lastTrainingMonth < mi - 1) {
      // 上个月没去培训
      addLog('⚠️ ' + pk + '上月未参加线下培训，本月无法接单！', 'bad');
    }
  }

  // ===== 家庭系统月度处理 =====

  // 每月结婚概率检查（未结婚时）
  if (!G.family.hasSpouse) {
    let marryChance = 0;
    if (G.player.age >= 30) marryChance = 0.4;
    else if (G.player.age >= 22) marryChance = 0.25;
    if (marryChance > 0 && Math.random() < marryChance) {
      G.family.hasSpouse = true;
      G.family.spouseName = G.player.gender === '男' ? generateFemaleName() : generateMaleName();
      G.family.marryMonth = getGameMonthIndex();
      G.family.marryAge = G.player.age;
      G.family.spouseRejectCount = 0;
      addLog('💑 结婚了！配偶：' + G.family.spouseName, 'good');
    }
  }

  // 已婚无子女，按结婚年限概率怀孕（每月检查）
  if (G.family.hasSpouse && G.family.children.length === 0 && G.family.marryAge <= 45) {
    let marriedMonths = getGameMonthIndex() - G.family.marryMonth;
    let pregnantChance = 0;
    if (marriedMonths <= 12) pregnantChance = 0.2;
    else if (marriedMonths <= 36) pregnantChance = 0.3;
    else if (marriedMonths <= 60) pregnantChance = 0.2;
    
    if (pregnantChance > 0 && Math.random() < pregnantChance) {
      let childGender = chance(50) ? '男' : '女';
      G.family.children.push({
        age: 0,
        gender: childGender,
        birthMonth: getGameMonthIndex() + 10,
        tuition: randInt(3000, 10000),
        notBorn: true
      });
      addLog('🤰 ' + G.family.spouseName + '怀孕了！预计10个月后出生', 'good');
    }
  }

  // 处理未出生子女
  G.family.children.forEach(child => {
    if (child.notBorn && getGameMonthIndex() >= child.birthMonth) {
      child.notBorn = false;
      child.age = 0;
      addLog('👶 ' + (child.gender === '男' ? '儿子' : '女儿') + '出生了！', 'good');
    }
  })


  // 房贷还款已移至每日处理（每月2号支付）

  // 配偶事件（每月20%触发）

      {text:'答应（-' + cost + '元）', cls:'btn-success', action: function(){
        G.player.money -= cost; G.totalExpense += cost;
        addExpenseRecord('配偶事件', cost);
        addLog('💑 配偶事件：花费' + cost + '元', 'info');
        closeModal(); updateStatusBar(); saveGame();
      }},
      {text:'拒绝', cls:'btn-danger', action: function(){
        G.family.spouseRejectCount++;
        addLog('💔 拒绝了配偶的要求（累计' + G.family.spouseRejectCount + '/20）', 'bad');
        if (G.family.spouseRejectCount >= 20) {
          G.family.hasSpouse = false;
          addLog('💔 配偶离婚了！', 'bad');
          // 子女50%概率由用户抚养
          G.family.children.forEach(c => {
            if (chance(50)) {
              c.withFather = true; // 由用户抚养
              addLog('👶 ' + (c.gender === '男' ? '儿子' : '女儿') + '由您抚养', 'info');
            }
          });
        }
        closeModal(); saveGame();
      }}
    ]);
  }

  // 子女事件
  G.family.children.forEach((child, ci) => {
    if (child.notBorn) return;
    if (child.age < 22) {
      // 每月20%触发日常事件
      if (Math.random() < 0.2) {
        let events = ['老爸/老妈，我想吃麦当劳', '补习班要交费了', '我想买这个玩具', '学校要交活动费'];
        let evt = events[randInt(0, events.length - 1)];
        let cost = randInt(100, 1000);
        G.player.money -= cost; G.totalExpense += cost;
        addExpenseRecord('子女事件', cost);
        addLog('👶 子女事件：' + evt + ' -' + cost + '元', 'info');
      }
    } else if (child.age < 30) {
      // 22-29岁：每月20%触发要钱事件
      if (Math.random() < 0.2) {
        let cost = randInt(2000, 5000);
        G.player.money -= cost; G.totalExpense += cost;
        addExpenseRecord('子女事件', cost);
        addLog('👨‍👩‍👧 子女：老爸/老妈支援我下 -' + cost + '元', 'bad');
      }
    } else {
      // 30岁以上：每月40%触发给爸妈打钱
      if (Math.random() < 0.4) {
        let income = randInt(2000, 10000);
        G.player.money += income; G.totalIncome += income;
        addLog('🧧 子女打来' + income + '元："爸妈，这是孝敬你们的"', 'good');
      }
    }
  });

  // 子女学费（每年8月）
  if (d.month === 8) {
    G.family.children.forEach(child => {
      if (!child.notBorn && child.age >= 0 && child.age < 22) {
        let tuition = child.tuition || randInt(3000, 10000);
        G.player.money -= tuition;
        G.totalExpense += tuition;
        addExpenseRecord('子女事件', tuition);
        addLog('📚 子女学费 -' + tuition + '元', 'bad');
      }
    });
  }

  // 星享司机招募（游戏时间1年以上，DD平台，每月20%触发）
  if (G.platforms.DD.joined && !G.platforms.DD.starDriver && getElapsedYears() >= 1 && Math.random() < 0.2) {
    if (G.player.drive >= 50 && G.player.luxury >= 50 && G.player.talk >= 40) {
      showModal('DD星享司机招募', '<p>DD平台邀请您成为星享司机！</p><p>条件：驾驶≥50 豪车≥50 话术≥40</p><p>加入后可接更多跨城、远距离订单</p>', [
        {text:'加入星享司机', cls:'btn-success', action: function(){
          G.platforms.DD.starDriver = true;
          addLog('🌟 成为DD星享司机！', 'good');
          closeModal(); saveGame();
        }},
        {text:'暂不加入', cls:'btn-secondary', action: closeModal}
      ]);
    } else {
      addLog('📢 DD星享司机招募中（需驾驶≥50 豪车≥50 话术≥40）', 'info');
    }
  }

  // 她代驾招募（游戏时间1年以上，DD平台，女性，每月20%触发）
  if (G.platforms.DD.joined && !G.platforms.DD.sheDriver && G.player.gender === '女' && getElapsedYears() >= 1 && Math.random() < 0.2) {
    if (G.player.drive >= 30 && G.player.luxury >= 30 && G.player.talk >= 30) {
      showModal('DD她代驾司机招募', '<p>DD平台邀请您加入"她代驾"专区！</p><p>条件：驾驶≥30 豪车≥30 话术≥30</p><p>加入后可接更多预估收入高订单</p>', [
        {text:'加入她代驾', cls:'btn-success', action: function(){
          G.platforms.DD.sheDriver = true;
          addLog('🌸 成为DD她代驾司机！', 'good');
          closeModal(); saveGame();
        }},
        {text:'暂不加入', cls:'btn-secondary', action: closeModal}
      ]);
    } else {
      addLog('📢 DD她代驾招募中（需驾驶≥30 豪车≥30 话术≥30）', 'info');
    }
  }

  // 回头客检查
  G.returnCustomers = G.returnCustomers.filter(rc => {
    if (getGameMonthIndex() >= rc.triggerMonth) {
      if (chance(10)) { // 10%概率主动联系
        let income = randInt(60, 120);
        showModal('回头客', '<p>' + rc.name + '联系您要求代驾服务！</p><p>预估收入：' + income + '元</p>', [
          {text:'接单', cls:'btn-success', action: function(){
            G.player.money += income; G.monthlyIncome += income; G.totalIncome += income; G.totalOrders++;

            addLog('📞 回头客' + rc.name + '，收入' + income + '元', 'good');
            closeModal(); updateStatusBar(); saveGame();
          }},
          {text:'拒绝', cls:'btn-secondary', action: function(){ closeModal(); saveGame(); }}
        ]);
        return false;
      }
      // 未联系，保留到下个月再试
      rc.triggerMonth = getGameMonthIndex() + 1;
      return true;
    }
    return true;
  });

  // 包工头系统月度处理
  if (G.isBoss && G.drivers.length > 0) {
    G.drivers.forEach(function(d) {
      // 支付保底费8000元
      G.player.money -= 8000;
      G.totalExpense += 8000;
      addExpenseRecord('司机保底费', 8000);
      addLog('💼 支付司机' + d.name + '保底费8000元', 'info');

      // 合同到期检查
      let monthsWorked = getGameMonthIndex() - d.contractStartMonth;
      if (monthsWorked >= d.contractMonths) {
        addLog('👋 司机' + d.name + '合同到期，已离开', 'bad');
        d.left = true;
      }

      // 应用上月互动效果
      if (d.dailyOrderBonus !== 0) {
        d.dailyOrders = Math.max(1, d.dailyOrders + d.dailyOrderBonus);
        d.dailyOrderBonus = 0;
      }
    });

    // 移除已离开的司机
    let beforeCount = G.drivers.length;
    G.drivers = G.drivers.filter(d => !d.left);
    let leftCount = beforeCount - G.drivers.length;
    if (leftCount > 0) {
      addLog('👋 ' + leftCount + '名司机合同到期离开', 'bad');
    }

    // 司机收入和车损
    let totalDriverIncome = 0;
    G.drivers.forEach(function(d) {
      // 司机收入（日均完单量上下浮动3单，单均30-150）
      let dailyOrders = Math.max(1, d.dailyOrders + randInt(-3, 3));
      let daysInMonth = 30;
      let monthlyOrders = dailyOrders * daysInMonth;
      let driverIncome = 0;
      for (let j = 0; j < monthlyOrders; j++) {
        driverIncome += randInt(30, 150);
      }
      let myCut = Math.floor(driverIncome * 0.2);
      totalDriverIncome += myCut;
      addLog('💰 司机' + d.name + '本月收入' + driverIncome + '元，抽成' + myCut + '元', 'good');

      // 司机车损（按司机驾驶能力分档）
      let driverDmg = calcVehicleDamage(true, d.drive);
      if (chance(driverDmg.chance)) {
        let damage = randInt(driverDmg.minDmg, driverDmg.maxDmg);
        let myShare = Math.floor(damage * 0.2);
        G.player.money -= myShare; G.totalExpense += myShare;
        addLog('🔧 司机' + d.name + '车损，承担20%：-' + myShare + '元', 'bad');
        checkMoneyNegative();
      }
    });
    G.player.money += totalDriverIncome;
    G.monthlyIncome += totalDriverIncome;
    G.totalIncome += totalDriverIncome;
    G._monthBossIncome = (G._monthBossIncome || 0) + totalDriverIncome;
    if (totalDriverIncome > 0) addIncomeRecord('包工头收入', totalDriverIncome);
    if (totalDriverIncome > 0) addLog('💼 包工头本月抽成总收入：+' + totalDriverIncome + '元', 'good');
  }
}

function earlyRepayLoan(idx) {
  if (!G.loans || !G.loans[idx]) return;
  let loan = G.loans[idx];
  let repayAmount = loan.remaining;
  if (G.player.money < repayAmount) {
    showModal('余额不足', '<p>提前还款需要' + repayAmount + '元，您只有' + G.player.money + '元</p>', [{text:'确定', cls:'btn-primary', action:closeModal}]);
    return;
  }
  G.player.money -= repayAmount;
  G.totalExpense += repayAmount;
  G.loans.splice(idx, 1);
  G.credit++;
  addLog('💳 提前还清贷款！还款' + repayAmount + '元，征信+1（当前' + G.credit + '）', 'good');
  updateStatusBar(); showLoanManage(); saveGame();
}

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randFloat(min, max) { return Math.random() * (max - min) + min; }
function chance(pct) { return Math.random() * 100 < pct; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function getLandmarks(city) {
  return CITY_LANDMARKS[city] || CITY_LANDMARKS['default'];
}

function randLandmarks(city, count) {
  let all = getLandmarks(city).slice();
  let result = [];
  while (result.length < count && all.length > 0) {
    let idx = randInt(0, all.length - 1);
    result.push(all.splice(idx, 1)[0]);
  }
  return result;
}

// 将直线距离转换为实际道路里程（模拟地图实际里程）
function toActualDistance(straightDist) {
  // 道路系数：1.1~1.5，距离越远系数越大（绕路更多）
  let factor = 1.1 + (straightDist / 100) * 0.4;
  factor = Math.min(factor, 1.5);
  return Math.min(100, Math.max(1, Math.round(straightDist * factor)));
}

function showModal(title, bodyHTML, buttons, onClose, noCloseOnOverlay) {
  let mc = document.getElementById('modal-container');
  let btnsHTML = buttons ? buttons.map((b, i) =>
    '<button class="' + (b.cls || 'btn-secondary') + '"' + (b.id ? ' id="' + b.id + '"' : '') + ' onclick="modalBtnAction(' + i + ')">' + b.text + '</button>'
  ).join('') : '<button class="btn-secondary" onclick="closeModal()">关闭</button>';

  let overlayClick = noCloseOnOverlay ? '' : 'onclick="event.target===this&&closeModal()"';
  mc.innerHTML = '<div class="modal-overlay" ' + overlayClick + '>' +
    '<div class="modal">' +
    '<div class="modal-header"><h3>' + title + '</h3>' + (noCloseOnOverlay ? '' : '<button class="modal-close" onclick="closeModal()">&times;</button>') + '</div>' +
    '<div class="modal-body">' + bodyHTML + '</div>' +
    (buttons ? '<div class="modal-footer">' + btnsHTML + '</div>' : '') +
    '</div></div>';

  window._modalButtons = buttons || [];
  window._modalOnClose = onClose || null;
}

function modalBtnAction(idx) {
  if (window._modalButtons && window._modalButtons[idx] && window._modalButtons[idx].action) {
    window._modalButtons[idx].action();
  }
}

function closeModal() {
  let mc = document.getElementById('modal-container');
  mc.innerHTML = '';
  // 清理派单倒计时
  if (window._dispatchTimer) {
    clearInterval(window._dispatchTimer);
    window._dispatchTimer = null;
  }
  if (window._modalOnClose) {
    window._modalOnClose();
    window._modalOnClose = null;
  }
}

function selectGender(btn) {
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function randomizeAgeAndExp() {
  let ageRand = Math.random();
  let age;
  if (ageRand < 0.6) {
    age = randInt(20, 40);
  } else if (ageRand < 0.9) {
    age = randInt(40, 49);
  } else {
    age = randInt(50, 79);
  }
  let exp = randInt(1, Math.max(1, age - 18));
  document.getElementById('inp-age').value = age;
  document.getElementById('inp-exp').value = exp;
}

function createCharacter() {
  let name = document.getElementById('inp-name').value.trim();
  let gender = document.querySelector('.gender-btn.selected').dataset.gender;
  let city = document.getElementById('inp-city').value.trim();

  if (!name) { alert('请输入姓名'); return; }
  if (!city) { alert('请输入当前所在地'); return; }

  // 年龄和驾龄自动随机生成
  // 年龄分布：60%在20-40，30%在40-50（不含50），10%在50+
  let ageRand = Math.random();
  let age;
  if (ageRand < 0.6) {
    age = randInt(20, 40);
  } else if (ageRand < 0.9) {
    age = randInt(40, 49);
  } else {
    age = randInt(50, 79);
  }
  let exp = randInt(1, Math.max(1, age - 18));

  G = newGameState();
  G.player.name = name;
  G.player.gender = gender;
  G.player.age = age;
  G.player.city = city;
  G.player.exp = exp;
  G.player.startAge = age;
  G.player.startExp = exp;
  G.player.money = randInt(3500, 5000);
  G.player.drive = randInt(10, 30);
  G.player.talk = randInt(10, 30);
  G.player.luxury = randInt(10, 15);

  // 家庭系统初始化
  // 30%概率有配偶
  G.family.hasSpouse = chance(40);
  if (G.family.hasSpouse) {
    G.family.spouseName = G.player.gender === '男' ? generateFemaleName() : generateMaleName();
    G.family.marryMonth = 0; // 游戏开始时已婚
    G.family.marryAge = age;
    addLog('💑 已婚，配偶：' + G.family.spouseName, 'info');
  }

  // 30%概率有房贷（与房租互斥）
  if (chance(40)) {
    G.family.hasMortgage = true;
    G.family.mortgageMonthly = randInt(2000, 8000);
    G.family.mortgageMonthsLeft = 120; // 固定10年
    G.family.mortgageTotalMonths = 120;
    addLog('🏠 有房贷，月供' + G.family.mortgageMonthly + '元（10年）', 'info');
  }

  // 子女（有配偶时50%概率）
  if (G.family.hasSpouse && chance(50)) {
    let childAge = Math.max(1, age - 27);
    if (childAge >= 0) {
      let childGender = chance(50) ? '男' : '女';
      G.family.children.push({
        age: childAge,
        gender: childGender,
        birthMonth: -getGameMonthIndex() - childAge * 12, // 近似出生月份
        tuition: randInt(3000, 10000)
      });
      addLog('👶 有' + (childGender === '男' ? '儿子' : '女儿') + '，' + childAge + '岁', 'info');
    }
  }

  // 随机设置初始所在地标
  let initLandmarks = getLandmarks(city);
  G.currentLocation = initLandmarks[randInt(0, initLandmarks.length - 1)];

  addLog('🎮 游戏开始！欢迎，' + name + '！', 'info');
  addLog('👤 年龄' + age + '岁，驾龄' + exp + '年', 'info');
  addLog('💰 初始金钱：' + G.player.money + '元', 'good');
  addLog('📊 驾驶能力' + G.player.drive + ' | 话术能力' + G.player.talk + ' | 豪车驾驶' + G.player.luxury, 'info');

  // 新手引导：初始设定页
  G._tutorial.seen['char_create'] = true; // 标记已看过初始页

  showMainUI();
  saveGame();
}

function showMainUI() {
  document.getElementById('char-create').style.display = 'none';
  document.getElementById('main-menu').style.display = 'block';

  document.getElementById('status-bar').style.display = 'none';

  renderLog();
}

function updateStatusBar() {
  if (!G) return;
  let locEl = document.getElementById('sb-location');
  if (locEl) {
    locEl.textContent = G.player.city + '-' + (G.currentLocation || G.player.city);
  }
}

function renderScoreDisplay() {
  let el = document.getElementById('score-display');
  if (!G) return;
  let joinedAny = Object.values(G.platforms).some(p => p.joined);
  if (!joinedAny) { el.innerHTML = ''; return; }

  let html = '';
  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    if (!p.joined) continue;
    let listeningClass = p.listening ? 'on' : 'off';
    let listeningText = p.listening ? '听单中' : '未听单';
    let dotHTML = p.listening ? '<div class="listening-dot"></div>' : '';
    html += '<div class="score-box">' +
      '<div class="score-label">' + pk + (p.preferred ? '(优选)' : '') + '</div>' +
      '<div class="score-val">' +
        '<span class="listening-badge ' + listeningClass + '">' + dotHTML + listeningText + '</span>' +
      '</div>' +
      '<div class="score-label">代驾分:' + p.daijiaScore.toFixed(1) + ' | 服务分:' + p.serviceScore.toFixed(1) + '</div>' +
      '<div class="score-label">本月:' + p.monthlyOrders + '/' + p.monthlyTarget + '单</div>' +
      '</div>';
  }
  el.innerHTML = html;
}

function buildMenuItemHTML(item) {
  let showTip = item.tutorialId && G && G._tutorial && !G._tutorial.skipped && !G._tutorial.seen[item.tutorialId];
  let tipHTML = showTip ? '<span class="menu-tip">?</span>' : '';
  let clickHandler = '';
  if (item.action && !item.disabled) {
    if (item.tutorialId) {
      clickHandler = 'onclick="handleMenuClick(\'' + item.action + '\',\'' + item.tutorialId + '\')"';
    } else {
      clickHandler = 'onclick="' + item.action + '()"';
    }
  }
  return '<div class="menu-item" style="' + (item.disabled ? 'opacity:0.4;pointer-events:none;' : '') + '" ' + clickHandler + '>' +
    '<div class="menu-icon">' + item.icon + '</div>' +
    '<div class="menu-text"><h3>' + item.title + '</h3><p>' + item.desc + '</p></div>' +
    (item.badge ? '<span class="menu-badge">' + item.badge + '</span>' : '') +
    tipHTML +
    '</div>';
}

function handleMenuClick(action, tutorialId) {
  if (G && G._tutorial && !G._tutorial.skipped && tutorialId && !G._tutorial.seen[tutorialId]) {
    let tips = {
      'join_platform': { title: '📖 加入平台', content: '选择DD/GD/E平台加入后，可开启听单接单。不同平台装备费和派单速度不同。' },

      'online_order': { title: '📖 我要接单', content: '开启<b>听单</b>后系统自动派单；也可在抢单大厅<b>手动抢单</b>。取送车需认证后才能接到。' },

      'finance': { title: '📖 理财', content: '银行理财保本保息；基金股票每日波动有赚有亏；乐透是小额彩票。' },
      'boss': { title: '📖 包工头模式', content: '缴纳保证金招募司机，每单抽成20%。需承担保底工资和辞退赔偿。' },
      'expense_detail': { title: '📖 收支明细', content: '查看每月收入和支出的详细分类，关注净收入趋势。' },
      'train': { title: '📖 高铁出行', content: '购买高铁票前往其他城市，不同城市订单密度可能不同。' }
    };
    let tip = tips[tutorialId];
    if (tip) {
      G._tutorial.seen[tutorialId] = true;
      saveGame();
      let html = '<p style="font-size:14px;line-height:1.6;">' + tip.content + '</p>';
      html += '<div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end;">';

function canRejoinPlatform(pk) {
  let p = G.platforms[pk];
  if (p.kickedOutMonth < 0) return false;
  let kickedMonth = p.kickedOutMonth;
  let currentMonth = getGameMonthIndex();
  
  // 只有11月-来年2月可返聘（旺季）
  let currentMonthInYear = getGameDate().month; // 1-12
  let isReturnSeason = (currentMonthInYear === 11 || currentMonthInYear === 12 || currentMonthInYear === 1 || currentMonthInYear === 2);
  
  if (!isReturnSeason) return false;
  
  // 如果在旺季期间清退，30天后可返聘
  // 如果在非旺季清退，当年11月即可返聘（无需等30天）
  if (currentMonth - kickedMonth >= 1) return true;
  
  // 清退不到30天，但在旺季：检查是否是"当年11月即可返聘"的情况
  // 即：清退发生在非旺季，当前到了旺季
  return true; // 旺季期间都允许返聘
}

function showJoinPlatform() {
  let html = '';
  let d = getGameDate();
  let winter = isWinterDiscount();
  let discountNote = winter ? '<p style="color:var(--success);margin-bottom:12px;">🎄 冬季折扣（旺季）：装备费和路考费5折！</p>' : '';

  html += discountNote;

  for (let pk of ['DD','GD','E']) {
    let p = G.platforms[pk];
    let equipFee = pk === 'E' ? 200 : 300;
    let roadFee = 300;
    if (winter) { equipFee = Math.floor(equipFee * 0.5); roadFee = Math.floor(roadFee * 0.5); }

    // 优选条件
    let canPreferred = false;
    let prefBonus = 0;
    if (pk === 'DD') {
      canPreferred = G.player.exp >= 5 && (G.player.drive >= 25 || G.player.luxury >= 20);
      prefBonus = 200;
    } else if (pk === 'GD') {
      canPreferred = G.player.exp >= 5 && (G.player.drive >= 25 || G.player.luxury >= 20);
      prefBonus = 200;
    } else {
      canPreferred = G.player.drive >= 20 || G.player.luxury >= 18;
      prefBonus = 150;
    }
    if (winter) prefBonus = Math.floor(prefBonus * 0.5);

    let isKickedOut = p.kickedOutMonth >= 0;
    let statusText;
    if (isKickedOut) {
      statusText = '<span style="color:var(--danger);">已清退</span>';
    } else if (p.joined) {
      statusText = '<span style="color:var(--success);">已加入' + (p.preferred ? '（优选司机）' : '') + '</span>';
    } else {
      statusText = (G.player.age > 50 && (pk === 'DD' || pk === 'GD') ? '<span style="color:var(--danger);">年龄超过50岁，无法加入</span>' : '未加入');
    }
    let prefText = canPreferred ? '<span style="color:var(--gold);">可申请优选（+' + prefBonus + '元，优质订单+10%）</span>' : '<span style="color:var(--text-secondary);">不满足优选条件</span>';

    // 优选条件说明
    let prefCondition = '';
    if (pk === 'DD') prefCondition = '驾龄≥5 且 (驾驶≥25 或 豪车≥20)';
    else if (pk === 'GD') prefCondition = '驾龄≥5 且 (驾驶≥22 或 豪车≥20)';
    else prefCondition = '驾驶≥20 或 豪车≥18';

    html += '<div class="platform-card">' +
      '<h4>' + pk + '代驾</h4>' +
      '<div class="platform-info">' +
      '<div>状态：<span>' + statusText + '</span></div>' +
      '<div>装备费：<span>' + equipFee + '元</span></div>' +
      '<div>路考费：<span>' + roadFee + '元</span></div>' +
      '<div>优选条件：<span>' + prefCondition + '</span></div>' +
      '<div>优选状态：<span>' + prefText + '</span></div>' +
      '<div>优质订单比例：<span>' + (pk === 'DD' ? '25%' : pk === 'GD' ? '20%' : '10%') + '</span></div>' +
      '<div>派单间隔：<span>' + (pk === 'DD' ? '1分钟' : pk === 'GD' ? '3分钟' : '5分钟') + '</span></div>' +
      '</div>';

    if (!p.joined) {
      html += '<div style="margin-top:10px;display:flex;gap:8px;">';
      let totalFee = equipFee + roadFee;
      let feeLabel = winter ? totalFee + '元 <span style="text-decoration:line-through;color:var(--text-secondary);font-size:11px;">' + ((pk==='E'?200:300)+300) + '元</span>' : totalFee + '元';
      html += '<button class="btn-success btn-small" onclick="joinPlatform(\'' + pk + '\',false)">普通加入（' + feeLabel + '）</button>';
      if (canPreferred) {
        html += '<button class="btn-warning btn-small" onclick="joinPlatform(\'' + pk + '\',true)">优选加入（' + (equipFee + roadFee + prefBonus) + '元）</button>';
      }
      // 旺季返聘：被清退后可重新加入
      if (p.kickedOutMonth >= 0) {
        if (canRejoinPlatform(pk)) {
          html += '<button class="btn-warning btn-small" onclick="rejoinPlatform(\'' + pk + '\')">旺季返聘（免费重新加入）</button>';
        } else {
          html += '<span style="font-size:12px;color:var(--text-secondary);margin-left:8px;">不在返聘期</span>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  }

  showModal('加入平台', html, [{text:'关闭', cls:'btn-secondary', action:closeModal}]);
}

function upgradeToPreferred(pk) {
  let p = G.platforms[pk];
  if (!p.joined || p.preferred) return;
  let equipFee = pk === 'E' ? 200 : 300;
  let t = getGameTime();
  let mi = getGameMonthIndex();
  let wi = Math.floor(mi / 4);
  let winter = (mi % 12 >= 10 || mi % 12 <= 1);
  if (winter) equipFee = Math.floor(equipFee * 0.5);
  if (G.player.money < equipFee) {
    showModal('余额不足', '<p>升级优选需要' + equipFee + '元</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]);
    return;
  }
  G.player.money -= equipFee;
  G.totalExpense += equipFee;
  p.preferred = true;
  addLog('⬆ ' + pk + '升级为优选司机！-' + equipFee + '元', 'good');
  closeModal();
  showOnlineOrder();
  saveGame();
}

function joinPlatform(pk, preferred) {
  let p = G.platforms[pk];
  if (p.joined) return;

  // 年龄限制检查
  if (G.player.age > 50 && (pk === 'DD' || pk === 'GD')) {
    showModal('无法加入', '<p>年龄超过50岁，无法加入' + pk + '平台。</p>',
      [{text:'确定', cls:'btn-primary', action:closeModal}]);
    return;
  }

  let equipFee = pk === 'E' ? 200 : 300;
  let roadFee = 300;
  let prefBonus = 0;
  let winter = isWinterDiscount();

  if (winter) { equipFee = Math.floor(equipFee * 0.5); roadFee = Math.floor(roadFee * 0.5); }

  if (preferred) {
    if (pk === 'DD' || pk === 'GD') prefBonus = 200;
    else prefBonus = 150;
    if (winter) prefBonus = Math.floor(prefBonus * 0.5);
  }

  let total = equipFee + roadFee + prefBonus;
  if (G.player.money < total) {
    showModal('余额不足', '<p>加入' + pk + '需要' + total + '元，您只有' + G.player.money + '元。</p>',
      [{text:'确定', cls:'btn-primary', action:closeModal}]);
    return;
  }

  G.player.money -= total;
  G.totalExpense += total;
  p.joined = true;
  p.joinMonth = getGameMonthIndex();
  p.preferred = preferred;
  p.daijiaScore = 12;
  p.serviceScore = 50;
  p.lastTrainingMonth = getGameMonthIndex();

  addLog('✅ 成功加入' + pk + '代驾！' + (preferred ? '（优选司机）' : '') + ' -' + total + '元', 'good');

  // 平台通知事件
  let notifications = [
    pk + '平台欢迎您加入！请仔细阅读平台规则。',
    pk + '平台提醒：请保持良好服务态度。',
    pk + '平台通知：新司机有7天保护期。',
    pk + '平台公告：本月有满单奖励活动。'
  ];
  let notif = notifications[randInt(0, notifications.length - 1)];
  addLog('📢 ' + notif, 'info');

  closeModal();
  // 新手引导：首次加入任意平台
  setTimeout(function() {
    showTutorial('after_join', '📖 开启听单',
      '加入平台后，请前往<b>「我要接单」</b>开启听单按钮，系统会自动派单。<br>' +
      '也可以在抢单大厅手动选择订单。');
  }, 500);
  showJoinPlatform();
  updateStatusBar();
  renderScoreDisplay();
  renderMainMenu();
  saveGame();
}

function rejoinPlatform(pk) {
  let p = G.platforms[pk];
  if (p.joined || !canRejoinPlatform(pk)) return;

  p.joined = true;
  p.preferred = false;
  p.daijiaScore = 12;
  p.serviceScore = 50;
  p.lastTrainingMonth = getGameMonthIndex();
  p.kickedOutMonth = -1;
  p.rejectCount7 = 0;
  p.rejectCount30 = 0;

  addLog('🐉 通过旺季返聘重新加入' + pk + '代驾！', 'good');
  closeModal();
  showJoinPlatform();
  updateStatusBar();
  renderScoreDisplay();
  renderMainMenu();
  saveGame();
}

function startOfflineOrder() {
  if (G.injured) {
    showModal('受伤休息中', '<p>您正在受伤休息中，还有' + (G.injuredUntilDay - getGameDayIndex()) + '天恢复</p>', [{text:'确定',cls:'btn-primary',action:closeModal}]);
    return;
  }
  let landmarks = randLandmarks(G.player.city, randInt(5, 8));
  let hasVest = G.hasDDVest || G.hasGDVest;
  let vestBonus = hasVest ? '<p style="color:var(--gold);">穿戴马甲中，信任度提升</p>' : '';

  // 如果已在某个地点，先展示当前地点的NPC
  let currentLoc = G.currentLocation || '';
  let t = getGameTime();
  let isNight = t.h >= 22 || t.h < 4;
  let npcCount = isNight ? randInt(4, 5) : randInt(2, 5);
  let npcs = [];
  for (let i = 0; i < npcCount; i++) npcs.push(generateNPC());
  window._offlineNPCs = npcs;
  window._offlineLocation = currentLoc;

  let html = vestBonus;

  // 当前地点NPC
  if (currentLoc) {
    html += '<h4 style="margin-bottom:8px;">当前位置：' + currentLoc + '</h4>';
    html += '<div style="margin-bottom:12px;">';
    npcs.forEach((npc, i) => {
      html += '<div class="npc-item"><span class="npc-desc">' + npc.desc + '（' + npc.hometown + '）</span>' +
        '<button class="btn-success btn-small" onclick="talkToNPC(' + i + ')">询问</button></div>';
    });
    html += '</div>';
  }

  // 其他可去地点
  html += '<h4 style="margin-bottom:8px;">前往其他地点</h4><div class="location-list">';
  landmarks.forEach((loc, i) => {
    if (loc === currentLoc) return; // 跳过当前地点
    let walkMin = randInt(5, 25);
    let bikeMin = (G.hasBike && G.bikeAvailable) ? Math.max(1, Math.floor(walkMin * 0.4)) : null;
    let bikeText = (G.hasBike && G.bikeAvailable) ? ' | 骑车' + bikeMin + '分钟' : '';
    html += '<div class="location-item" onclick="goToLocation(\'' + loc + '\',' + walkMin + ',' + (bikeMin || walkMin) + ')">' +
      '<div><div class="location-name">' + loc + '</div><div class="location-dist">步行' + walkMin + '分钟' + bikeText + '</div></div>' +
      '<span style="color:var(--text-highlight);">→</span></div>';
  });
  html += '</div>';

  showModal('寻找报单', html, [{text:'返回', cls:'btn-secondary', action:closeModal}]);
}

function goToLocation(loc, walkMin, bikeMin) {
  let timeCost = (G.hasBike && G.bikeAvailable) ? bikeMin : walkMin;
  let method = (G.hasBike && G.bikeAvailable) ? '骑车' : '步行';
  advanceTime(timeCost);
  addLog('🚶 ' + method + '前往' + loc + '，耗时' + timeCost + '分钟', 'info');

  // 生成NPC
  let t = getGameTime();
  let isNight = t.h >= 22 || t.h < 4;
  let npcCount = isNight ? randInt(4, 5) : randInt(2, 5);
  let npcs = [];
  for (let i = 0; i < npcCount; i++) npcs.push(generateNPC());

  let html = '<p style="margin-bottom:10px;">到达' + loc + '，发现' + npcCount + '位潜在客户：</p>';
  npcs.forEach((npc, i) => {
    html += '<div class="npc-item"><span class="npc-desc">' + npc.desc + '（' + npc.hometown + '）</span>' +
      '<button class="btn-success btn-small" onclick="talkToNPC(' + i + ')">询问</button></div>';
  });

  window._offlineNPCs = npcs;
  window._offlineLocation = loc;

  showModal('线下报单 - ' + loc, html, [{text:'换地方', cls:'btn-secondary', action:startOfflineOrder}]);
}

function showNPCListAtLocation(loc) {
  let t = getGameTime();
  let isNight = t.h >= 22 || t.h < 4;
  let npcCount = isNight ? randInt(4, 5) : randInt(2, 5);
  let npcs = [];
  for (let i = 0; i < npcCount; i++) npcs.push(generateNPC());

  let html = '<p style="margin-bottom:10px;">在' + loc + '继续寻找客户：</p>';
  npcs.forEach((npc, i) => {
    html += '<div class="npc-item"><span class="npc-desc">' + npc.desc + '（' + npc.hometown + '）</span>' +
      '<button class="btn-success btn-small" onclick="talkToNPC(' + i + ')">询问</button></div>';
  });

  window._offlineNPCs = npcs;
  window._offlineLocation = loc;

  showModal('线下报单 - ' + loc, html, [{text:'换地方', cls:'btn-secondary', action:startOfflineOrder}]);
}

function talkToNPC(idx) {
  let npc = window._offlineNPCs[idx];
  let talk = G.player.talk;

  // 基础成功率
  let rate = 0;
  if (talk > 80) rate = 85;
  else if (talk > 60) rate = 75;
  else if (talk > 40) rate = 50;
  else if (talk > 20) rate = 30;
  else rate = 15;

  // 加成
  let ageDiff = Math.abs(G.player.age - npc.age);
  if (ageDiff <= 5) rate += 10;
  if (G.player.gender === '女' && npc.gender === '女') rate += 20;
  if (G.player.gender !== npc.gender) rate -= 20;

  rate = clamp(rate, 0, 100);

  advanceTime(5); // 询问耗时5分钟

  if (chance(rate)) {
    addLog('✅ 成功说服' + npc.desc + '使用代驾服务！', 'good');
    closeModal();
    startOfflineFulfillment(npc, window._offlineLocation);
  } else {
    addLog('❌ ' + npc.desc + '拒绝了您的服务', 'bad');
    showModal('报单失败', '<p>' + npc.desc + '不需要代驾服务。</p><p style="color:var(--text-secondary);margin-top:8px;">成功率：' + rate + '%</p>',
      [
        {text:'继续询问其他人', cls:'btn-secondary', action: function(){ closeModal(); showNPCListAtLocation(window._offlineLocation); }},
        {text:'换地方', cls:'btn-secondary', action: function(){ closeModal(); startOfflineOrder(); }}
      ]);
  }
}

function startOfflineFulfillment(npc, location) {
  // 生成终点
  let endLandmarks = randLandmarks(G.player.city, 3).filter(l => l !== location);
  let endLocation = endLandmarks.length > 0 ? endLandmarks[randInt(0, endLandmarks.length - 1)] : location;
  window._offlineEndLocation = endLocation;

  // 根据入职年限调整收入
  let years = getElapsedYears();
  let targetMin, targetMax;
  if (years < 1) { targetMin = 60; targetMax = 80; }
  else if (years < 2) { targetMin = 70; targetMax = 100; }
  else { targetMin = 80; targetMax = 130; }

  let income = Math.floor(randInt(targetMin, targetMax) * 1.2);
  let distance = Math.max(3, Math.round((income - 30) / 9 + 5));

  // 恶劣天气乘客红包
  let weatherBonus = 0;
  if (G.weather === '下雨' || G.weather === '下雪') {
    weatherBonus = 50;
    income += weatherBonus;
  }

  // 恶劣天气受伤检查
  if ((G.weather === '下雨' || G.weather === '下雪') && chance(5) && !G.injured) {
    G.injured = true;
    G.injuredUntilDay = getGameDayIndex() + 7;
    G.player.money += 1000;
    addLog('🏥 恶劣天气受伤！保险赔付1000元，休息7天', 'bad');
    showModal('受伤了！', '<p style="color:var(--danger);">恶劣天气导致受伤！</p><p>保险赔付1000元</p><p>需要休息7天才能继续接单</p>', [{
      text:'休息', cls:'btn-primary', action: function(){
        closeModal();
        let daysToSkip = 7;
        advanceTime(daysToSkip * 24 * 60);
        G.injured = false;
        G.injuredUntilDay = -1;
        addLog('💪 伤势恢复，可以继续接单了！', 'good');
        updateStatusBar(); renderMainMenu(); saveGame();
      }
    }]);
    return;
  }

  let talk = G.player.talk;

  // 报单计费
  let pricePerKm = 9;
  if (talk >= 80) pricePerKm += 3;
  else if (talk >= 50) pricePerKm += 1;

  let baseFee = 30;
  let distFee = Math.max(0, distance - 5) * pricePerKm;
  let totalFee = income + G.priceAdjust;

  // 打赏
  let tip = 0;
  if (talk >= 80 && chance(30)) tip = randInt(0, 100);
  else if (talk >= 50 && chance(30)) tip = randInt(0, 50);

  // 豪车检测
  let isLuxury = chance(20);
  let luxuryCheck = '';
  if (isLuxury) {
    luxuryCheck = '<p style="color:var(--warning);margin:8px 0;">⚠️ 这是一辆豪车！</p>';
  }

  let html = '<p>客户：' + npc.desc + '</p>' +
    '<p>起点：' + location + '</p>' +
    '<p>距离：' + distance + '公里</p>' +
    '<p>计费：起步30元 + ' + Math.max(0, distance - 5) + 'km × ' + pricePerKm + '元 = <span style="color:var(--gold);font-weight:bold;">' + totalFee + '元</span></p>' +
    (tip > 0 ? '<p>打赏：+' + tip + '元</p>' : '') +
    luxuryCheck;

  let buttons = [];
  if (isLuxury && G.player.luxury <= 100) {
    // 豪车订单：按豪车驾驶能力分档判定车损
    let dmgInfo = calcVehicleDamage(true, G.player.luxury);
    let riskText = '车损概率' + dmgInfo.chance + '%，赔偿' + dmgInfo.minDmg + '-' + dmgInfo.maxDmg + '元';
    buttons.push({text:'尝试驾驶豪车（' + riskText + '）', cls:'btn-danger', action: function(){
      if (chance(dmgInfo.chance)) {
        let damage = randInt(dmgInfo.minDmg, dmgInfo.maxDmg);
        G.player.money -= damage;
        G.totalExpense += damage;
        G._monthDamageCost = (G._monthDamageCost || 0) + damage;
        addExpenseRecord('车损赔偿', damage);
        applyDamagePenalty(null);
        addLog('💥 豪车事故！赔偿' + damage + '元', 'bad');
        showModal('事故！', '<p style="color:var(--danger);">驾驶豪车时发生事故，赔偿' + damage + '元！</p>',
          [{text:'确定', cls:'btn-primary', action:function(){ closeModal(); checkMoneyNegative(); }}]);
      } else {
        completeOfflineOrder(distance, totalFee, tip);
      }
    }});
    buttons.push({text:'取消订单', cls:'btn-secondary', action:closeModal});
  } else if (!isLuxury && G.player.drive < 80) {
    // 普通订单：按驾驶能力分档判定车损（80以上不触发）
    let dmgInfo = calcVehicleDamage(false, G.player.drive);
    buttons.push({text:'开始服务（车损概率' + dmgInfo.chance + '%）', cls:'btn-success', action: function(){
      if (chance(dmgInfo.chance)) {
        let damage = randInt(dmgInfo.minDmg, dmgInfo.maxDmg);
        G.player.money -= damage;
        G.totalExpense += damage;
        G._monthDamageCost = (G._monthDamageCost || 0) + damage;
        addExpenseRecord('车损赔偿', damage);
        applyDamagePenalty(null);
        addLog('💥 行驶事故！赔偿' + damage + '元', 'bad');
        showModal('事故！', '<p style="color:var(--danger);">行驶中发生事故，赔偿' + damage + '元！</p>',
          [{text:'确定', cls:'btn-primary', action:function(){ closeModal(); checkMoneyNegative(); }}]);
      } else {
        completeOfflineOrder(distance, totalFee, tip);
      }
    }});
  } else {
    buttons.push({text:'开始服务', cls:'btn-success', action: function(){
      completeOfflineOrder(distance, totalFee, tip);
    }});
  }

  showModal('报单 - 确认服务', html, buttons);
}

function completeOfflineOrder(distance, fee, tip) {
  let driveTime = Math.max(10, Math.floor(distance * 1.5)); // 简化行驶时间
  advanceTime(driveTime);

  // 送到停车位事件 70%
  if (chance(70)) {
    showModal('到达终点', '<p>乘客要求送到指定停车位。</p>', [
      {text:'送到指定车位', cls:'btn-success', action: function(){
        closeModal();
        advanceTime(10);
        addLog('👍 送到指定车位', 'good');
        finishOfflineOrder(distance, fee, tip);
      }},
      {text:'直接离开', cls:'btn-danger', action: function(){
        closeModal();
        addLog('😡 未送到位', 'bad');
        finishOfflineOrder(distance, fee, tip);
      }}
    ]);
  } else {
    finishOfflineOrder(distance, fee, tip);
  }
}

function finishOfflineOrder(distance, fee, tip) {
  G.player.money += fee + tip;
  G.monthlyIncome += fee + tip;
  G.totalIncome += fee + tip;
  G.totalOrders++;
  G._monthOfflineOrders = (G._monthOfflineOrders || 0) + 1;
  addIncomeRecord('线下报单', fee + tip);

  addLog('💰 完成报单服务，收入' + fee + '元' + (tip > 0 ? '（含打赏' + tip + '元）' : ''), 'good');

  // 更新当前地点为报单终点
  if (window._offlineEndLocation) {
    G.currentLocation = window._offlineEndLocation;
  }

  // 10%概率差评
  if (chance(10)) {
    // 报单没有特定平台，对所有已加入平台扣分
    for (let pk of ['DD','GD','E']) {
      if (G.platforms[pk].joined) {
        G.platforms[pk].serviceScore = Math.max(0, G.platforms[pk].serviceScore - 1);
      }
    }
    addLog('⭐ 收到差评，服务分-1', 'bad');
  }

  // 20%概率成为回头客
  if (chance(20) && window._offlineNPCs && window._offlineNPCs.length > 0) {
    let npc = window._offlineNPCs[0];
    let triggerMonth = getGameMonthIndex() + 1; // 7天后约1个月
    G.returnCustomers.push({ name: npc.desc, location: window._offlineLocation, triggerMonth });
    addLog('👤 乘客成为回头客！7天后可能联系您', 'good');
  }

  // 35%概率好评，驾驶能力微增
  if (chance(35)) {
    G.player.drive += 0.1;
    addLog('⭐ 获得好评！驾驶能力+0.1', 'good');
  }

  showModal('服务完成', '<p style="color:var(--success);">服务完成！收入' + fee + '元' + (tip > 0 ? ' + 打赏' + tip + '元' : '') + '</p>',
    [{text:'确定', cls:'btn-primary', action: function(){ closeModal(); updateStatusBar(); renderMainMenu(); saveGame(); }}]);
}

function buildHeatmapHTML() {
  let landmarks = randLandmarks(G.player.city, randInt(5, 8));
  let t = getGameTime();
  let isNight = t.h >= 20 || t.h < 6;

  let html = '<div class="heatmap-grid">';
  landmarks.forEach((loc, idx) => {
    let offlineOrders = isNight ? randInt(3, 10) : randInt(1, 5);
    let onlineOrders = isNight ? randInt(5, 15) : randInt(2, 8);
    let total = offlineOrders + onlineOrders;
    let heat = total > 15 ? '🔥' : total > 10 ? '🔶' : total > 5 ? '🟡' : '🟢';
    let dist = randInt(1, 20);
    let walkMin = randInt(5, 30);
    let bikeMin = (G.hasBike && G.bikeAvailable) ? Math.max(1, Math.floor(walkMin * 0.4)) : 0;
    let bikeText = (G.hasBike && G.bikeAvailable) ? ' | 骑车' + bikeMin + 'min' : '';

    html += '<div class="heatmap-item" style="cursor:pointer;" onclick="travelToLocation(\'' + loc.replace(/'/g, "\\'") + '\',' + walkMin + ',' + bikeMin + ')">' +
      '<div class="heat-level">' + heat + '</div>' +
      '<div class="heat-name">' + loc + '</div>' +
      '<div class="heat-count">' + dist + 'km | 步行' + walkMin + 'min' + bikeText + '</div>' +
      '<div class="heat-count">报单' + offlineOrders + ' 线上' + onlineOrders + '</div>' +
      '</div>';
  });
  html += '</div>';
  return html;
}

// 点击热力图地标前往该地
function travelToLocation(loc, walkMin, bikeMin) {
  let travelTime = (G.hasBike && G.bikeAvailable) ? bikeMin : walkMin;
  let method = (G.hasBike && G.bikeAvailable) ? '骑车' : '步行';
  advanceTime(travelTime);
  G.currentLocation = loc;
  addLog('🚶 ' + method + '前往' + loc + '，耗时' + travelTime + '分钟', 'info');
  closeModal();
  updateStatusBar();
  renderMainMenu();
  saveGame();
}

function showHeatmap() {
  let html = buildHeatmapHTML();
  showModal('接单热力图 - ' + G.player.city, html, [{text:'关闭', cls:'btn-secondary', action:closeModal}]);
}
